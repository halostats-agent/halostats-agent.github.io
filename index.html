    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div id="lr-plot"></div>'+
      '<p class="readout" style="margin:2px 0 8px;">'+(lang==='id'?'Garis kuning = selisih (error) tiap titik ke garis. Tujuan: perkecil jumlah error kuadrat.':'Yellow lines = each point’s error to the line. Goal: minimize the sum of squared errors.')+'</p>'+
      '<label class="fld">'+(lang==='id'?'Kemiringan: ':'Slope: ')+'<b id="lr-mv">1.0</b></label>'+
      '<input type="range" id="lr-m" min="0" max="6" value="1" step="0.1" oninput="(window.__lr_u&&window.__lr_u())"/>'+
      '<label class="fld" style="margin-top:6px;display:block;">'+(lang==='id'?'Titik potong: ':'Intercept: ')+'<b id="lr-bv">60</b></label>'+
      '<input type="range" id="lr-b" min="40" max="70" value="60" step="0.5" oninput="(window.__lr_u&&window.__lr_u())"/>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">'+
        '<div style="background:#FEF3C7;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Jumlah error kuadrat (SSE)':'Sum of squared errors (SSE)')+'</div><div class="big" id="lr-sse" style="font-size:22px;">—</div></div>'+
        '<div style="background:#EFF6FF;border-radius:10px;padding:11px;"><div class="readout">R² '+(lang==='id'?'(kecocokan)':'(fit)')+'</div><div class="big" id="lr-r2" style="font-size:22px;color:#2563EB;">—</div></div>'+
      '</div>'+
      '<div class="btn-row" style="margin-top:12px;"><button class="btn primary" id="lr-ols">'+(lang==='id'?'Bandingkan dengan garis terbaik (OLS)':'Compare with best-fit line (OLS)')+'</button></div>'+
      '<div class="feedback" id="lr-fb" style="display:block;"></div>';
    document.getElementById('lr-fb').style.display='none';
    draw();
    document.getElementById('lr-ols').onclick=function(){
      var userS=sse(+document.getElementById('lr-m').value,+document.getElementById('lr-b').value);
      document.getElementById('lr-m').value=mOLS.toFixed(2); document.getElementById('lr-b').value=bOLS.toFixed(2); draw();
      var fb=document.getElementById('lr-fb'); fb.style.display='block';
      fb.innerHTML=(lang==='id'
        ?'Garis terbaik OLS: kemiringan <b>'+mOLS.toFixed(1)+'</b>, titik potong <b>'+bOLS.toFixed(0)+'</b>. SSE tebakanmu <b>'+userS.toFixed(0)+'</b> → SSE terbaik <b>'+sse(mOLS,bOLS).toFixed(0)+'</b>. Tidak ada garis lurus lain yang bisa mengalahkan SSE ini — itulah arti “paling pas”. Kemiringan '+mOLS.toFixed(1)+' berarti tiap +1 jam belajar dikaitkan dengan +'+mOLS.toFixed(1)+' poin nilai.'
        :'OLS best-fit line: slope <b>'+mOLS.toFixed(1)+'</b>, intercept <b>'+bOLS.toFixed(0)+'</b>. Your SSE <b>'+userS.toFixed(0)+'</b> → best SSE <b>'+sse(mOLS,bOLS).toFixed(0)+'</b>. No other straight line can beat this SSE — that is what “best fit” means. A slope of '+mOLS.toFixed(1)+' means each +1 hour of study is associated with +'+mOLS.toFixed(1)+' score points.');
      reveal();
    };
  },
  concept:{
    name:{id:'Regresi linier (kuadrat terkecil)', en:'Linear regression (least squares)'}, sub:{id:'Legendre & Gauss, ~1805', en:'Legendre & Gauss, ~1805'},
    def:{id:'Metode untuk memodelkan hubungan antara sebuah variabel hasil dan satu/lebih prediktor sebagai garis lurus, dengan memilih garis yang meminimalkan jumlah kuadrat selisih vertikal (error) antara titik data dan garis.', en:'A method for modeling the relationship between an outcome and one or more predictors as a straight line, choosing the line that minimizes the sum of squared vertical differences (errors) between the data points and the line.'},
    formula:'ŷ = <span class="v">β₀</span> + <span class="v">β₁</span>x   ·   β₁ = Σ(xᵢ−x̄)(yᵢ−ȳ) / Σ(xᵢ−x̄)²',
    theory:{id:'Mengapa kuadrat, bukan nilai mutlak? Mengkuadratkan error menghukum simpangan besar lebih keras, menghasilkan solusi tunggal yang mulus dan bisa dihitung dengan rumus tertutup (tidak perlu coba-coba). Garis OLS selalu melewati titik rata-rata (x̄, ȳ), dan R² menyatakan proporsi keragaman y yang dijelaskan model. Asumsinya penting: hubungan kira-kira linier, error acak dan ragamnya seragam.', en:'Why squares, not absolute values? Squaring penalizes large deviations more harshly, yielding a single smooth solution computable with a closed-form formula (no trial and error). The OLS line always passes through the mean point (x̄, ȳ), and R² states the proportion of variation in y explained by the model. The assumptions matter: roughly linear relationship, random errors with constant variance.'},
    practice:{id:'Regresi linier adalah kuda beban analisis data: memperkirakan harga rumah, tren penjualan, dosis–respons. Tapi hati-hati: kemiringan menunjukkan asosiasi, bukan otomatis sebab-akibat; ekstrapolasi jauh di luar rentang data berbahaya; dan satu pencilan bisa menarik garis secara berlebihan. Selalu plot datanya dulu — angka R² tinggi pun bisa menyesatkan kalau polanya sebenarnya melengkung.', en:'Linear regression is the workhorse of data analysis: estimating house prices, sales trends, dose–response. But beware: the slope shows association, not automatically causation; extrapolating far beyond the data range is dangerous; and a single outlier can drag the line too much. Always plot the data first — even a high R² can mislead if the true pattern is curved.'}
  }
});

/* ---------- 10. uji hipotesis ---------- */
addConcept({
  id:'hyptest', icon:'⚖️', color:'#9333EA',
  cat:{id:'Inferensi', en:'Inference'},
  title:{id:'Uji hipotesis', en:'Hypothesis testing'},
  tag:{id:'Memperketat standar bukti mengurangi satu jenis kesalahan — tapi diam-diam memperbesar yang lain.', en:'Tightening the standard of evidence reduces one kind of error — but quietly inflates the other.'},
  hook:{id:'Pengadilan menganggap terdakwa tak bersalah (H₀) sampai terbukti. Kalau kita perketat standar agar nyaris tak pernah menghukum orang tak bersalah, apa konsekuensinya?', en:'A court treats the defendant as not guilty (H₀) until proven otherwise. If we tighten the standard so we almost never convict an innocent person, what is the consequence?'},
  build:function(host,lang,reveal){
    var d=3;
    function pdf(x,mu){return Math.exp(-0.5*(x-mu)*(x-mu))/Math.sqrt(2*Math.PI);}
    function draw(){
      var c=+document.getElementById('ht-r').value;
      var a=1-normCdf(c), b=normCdf(c-d), power=1-b;
      var W=460,H=200,pad=26,xlo=-4,xhi=7;
      var X=function(x){return pad+(x-xlo)/(xhi-xlo)*(W-2*pad);}, Y=function(p){return H-pad-(p/0.42)*(H-2*pad);};
      function area(mu,from,to,col){var s='<path d="M'+X(from).toFixed(1)+' '+Y(0).toFixed(1);for(var x=from;x<=to+1e-9;x+=0.1){s+=' L'+X(x).toFixed(1)+' '+Y(pdf(x,mu)).toFixed(1);}s+=' L'+X(to).toFixed(1)+' '+Y(0).toFixed(1)+' Z" fill="'+col+'" opacity="0.55"/>';return s;}
      function curve(mu,col){var s='<path d="';for(var x=xlo,first=true;x<=xhi+1e-9;x+=0.1){s+=(first?'M':'L')+X(x).toFixed(1)+' '+Y(pdf(x,mu)).toFixed(1)+' ';first=false;}return s+'" fill="none" stroke="'+col+'" stroke-width="2"/>';}
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      s+=area(0,c,xhi,'#EF4444')+area(d,xlo,c,'#F59E0B');
      s+=curve(0,'#2563EB')+curve(d,'#16A34A');
      s+='<line x1="'+X(c).toFixed(1)+'" y1="14" x2="'+X(c).toFixed(1)+'" y2="'+(H-pad)+'" stroke="#0F172A" stroke-width="1.6" stroke-dasharray="4,3"/>';
      s+='<text x="'+X(0).toFixed(1)+'" y="26" text-anchor="middle" font-size="9" fill="#2563EB" font-weight="800">H₀</text>';
      s+='<text x="'+X(d).toFixed(1)+'" y="26" text-anchor="middle" font-size="9" fill="#16A34A" font-weight="800">H₁</text>';
      s+='</svg>';
      document.getElementById('ht-plot').innerHTML=s;
      document.getElementById('ht-a').textContent=(a*100).toFixed(1)+'%';
      document.getElementById('ht-b').textContent=(b*100).toFixed(1)+'%';
      document.getElementById('ht-pw').textContent=(power*100).toFixed(0)+'%';
    }
    window.__ht_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="ht-guess">'+
        '<button class="btn" data-v="tradeoff">'+(lang==='id'?'Lebih banyak yang bersalah lolos':'More guilty go free')+'</button>'+
        '<button class="btn" data-v="free">'+(lang==='id'?'Tidak ada efek samping':'No side effect')+'</button>'+
      '</div>'+
      '<div id="ht-after" style="display:none;margin-top:16px;">'+
        '<p class="readout" style="margin-bottom:6px;">'+(lang==='id'?'Biru = dunia tanpa efek (H₀), hijau = dunia ada efek (H₁). Garis = ambang “cukup bukti”.':'Blue = world with no effect (H₀), green = world with an effect (H₁). Line = the “enough evidence” threshold.')+'</p>'+
        '<div id="ht-plot"></div>'+
        '<label class="fld" style="display:block;margin-top:4px;">'+(lang==='id'?'Ambang bukti (geser kanan = makin ketat menghukum)':'Evidence threshold (slide right = stricter to convict)')+'</label>'+
        '<input type="range" id="ht-r" min="-1" max="5" value="1.645" step="0.05" oninput="(window.__ht_u&&window.__ht_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px;">'+
          '<div style="background:#FEF2F2;border-radius:10px;padding:10px;"><div class="readout" style="color:#EF4444;">α · positif palsu</div><div class="big" id="ht-a" style="font-size:20px;color:#EF4444;"></div></div>'+
          '<div style="background:#FFFBEB;border-radius:10px;padding:10px;"><div class="readout" style="color:#B45309;">β · negatif palsu</div><div class="big" id="ht-b" style="font-size:20px;color:#B45309;"></div></div>'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:10px;"><div class="readout" style="color:#16A34A;">power</div><div class="big" id="ht-pw" style="font-size:20px;color:#16A34A;"></div></div>'+
        '</div>'+
        '<div class="feedback" id="ht-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#ht-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('ht-after').style.display='block';
      document.getElementById('ht-fb').innerHTML=(lang==='id'
        ?'Geser ambang ke kanan: <b>α</b> (menghukum orang tak bersalah) mengecil, tapi <b>β</b> (membiarkan yang bersalah lolos) membesar. Kedua kesalahan ini saling tukar — menekan satu menaikkan yang lain. Satu-satunya cara memperkecil keduanya sekaligus adalah menambah bukti/data (memperjauh kedua kurva).'
        :'Slide the threshold right: <b>α</b> (convicting the innocent) shrinks, but <b>β</b> (letting the guilty go) grows. These two errors trade off — pushing one down pushes the other up. The only way to lower both at once is to gather more evidence/data (separating the two curves further).');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Uji hipotesis', en:'Hypothesis testing'}, sub:{id:'Neyman & Pearson, 1933', en:'Neyman & Pearson, 1933'},
    def:{id:'Kerangka pengambilan keputusan untuk memilih antara hipotesis nol (tidak ada efek) dan hipotesis alternatif, dengan menetapkan aturan yang mengendalikan peluang dua jenis kesalahan.', en:'A decision framework for choosing between a null hypothesis (no effect) and an alternative, by setting a rule that controls the probability of two kinds of error.'},
    formula:'Tipe I = <span class="v">α</span> = P(tolak H₀ | H₀ benar)<br>Tipe II = <span class="v">β</span> = P(gagal tolak H₀ | H₁ benar) · power = 1−β',
    theory:{id:'Asimetri itu disengaja: kita melindungi H₀ (status quo) dan hanya menolaknya bila bukti melewati ambang α yang kecil — seperti “tak bersalah sampai terbukti”. Menurunkan α membuat kita lebih jarang salah menolak H₀, tetapi otomatis menaikkan β (lebih sering melewatkan efek yang nyata). Power, kemampuan mendeteksi efek yang benar-benar ada, naik bila efeknya besar, ragam kecil, atau sampel besar.', en:'The asymmetry is deliberate: we protect H₀ (the status quo) and only reject it when evidence crosses a small threshold α — like “innocent until proven guilty”. Lowering α makes us less likely to wrongly reject H₀, but automatically raises β (more often missing a real effect). Power, the ability to detect an effect that truly exists, increases when the effect is large, variance is small, or the sample is large.'},
    practice:{id:'Pilih α berdasarkan biaya kesalahan: dalam pengujian obat, positif palsu (meluluskan obat tak berkhasiat) bisa lebih berbahaya daripada negatif palsu, atau sebaliknya. Lakukan power analysis sebelum eksperimen agar sampelnya cukup untuk mendeteksi efek yang berarti. Dan ingat: “gagal menolak H₀” bukan berarti “H₀ terbukti benar” — bisa jadi datanya hanya kurang kuat.', en:'Choose α based on the cost of errors: in drug testing, a false positive (approving an ineffective drug) may be worse than a false negative, or vice versa. Run a power analysis before the experiment so the sample is large enough to detect a meaningful effect. And remember: “failing to reject H₀” does not mean “H₀ is proven true” — the data may simply be too weak.'}
  }
});

/* ---------- 11. distribusi diskrit ---------- */
addConcept({
  id:'discdist', icon:'🎲', color:'#0891B2',
  cat:{id:'Probabilitas', en:'Probability'},
  title:{id:'Distribusi diskrit', en:'Discrete distribution'},
  tag:{id:'Hasil yang bisa dihitung satu per satu — dan kenapa angka 7 begitu istimewa pada sepasang dadu.', en:'Outcomes you can count one by one — and why 7 is so special on a pair of dice.'},
  hook:{id:'Kamu melempar dua dadu dan menjumlahkannya (2 sampai 12). Angka berapa yang paling sering muncul?', en:'You roll two dice and add them (2 to 12). Which total comes up most often?'},
  build:function(host,lang,reveal){
    function pmf(nd){var dist={0:1};for(var dd=0;dd<nd;dd++){var nx={};for(var s in dist){for(var f=1;f<=6;f++){var k=(+s)+f;nx[k]=(nx[k]||0)+dist[s]/6;}}dist=nx;}return dist;}
    function draw(){
      var nd=+document.getElementById('dd-r').value, dist=pmf(nd);
      var keys=Object.keys(dist).map(Number).sort(function(a,b){return a-b;});
      var maxp=Math.max.apply(null,keys.map(function(k){return dist[k];}));
      var mode=keys.reduce(function(m,k){return dist[k]>dist[m]?k:m;},keys[0]);
      var W=460,H=190,pad=26,bw=(W-2*pad)/keys.length;
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      keys.forEach(function(k,i){var h=dist[k]/maxp*(H-2*pad-8),x=pad+i*bw,y=H-pad-h,col=(k===mode?'#0891B2':'#A5DEEC');
        s+='<rect x="'+(x+1).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw-2).toFixed(1)+'" height="'+Math.max(0.5,h).toFixed(1)+'" rx="1.5" fill="'+col+'"/>';
        if(keys.length<=13)s+='<text x="'+(x+bw/2).toFixed(1)+'" y="'+(H-pad+11)+'" text-anchor="middle" font-size="9" fill="#94A3B8">'+k+'</text>';});
      s+='</svg>';
      document.getElementById('dd-plot').innerHTML=s;
      document.getElementById('dd-mode').textContent=mode+' ('+(dist[mode]*100).toFixed(1)+'%)';
      document.getElementById('dd-nd').textContent=nd;
    }
    window.__dd_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="dd-guess">'+
        '<button class="btn" data-v="2">2</button><button class="btn" data-v="7">7</button><button class="btn" data-v="12">12</button>'+
      '</div>'+
      '<div id="dd-after" style="display:none;margin-top:16px;">'+
        '<div id="dd-plot"></div>'+
        '<label class="fld" style="display:block;margin-top:6px;">'+(lang==='id'?'Jumlah dadu: ':'Number of dice: ')+'<b id="dd-nd">2</b></label>'+
        '<input type="range" id="dd-r" min="1" max="6" value="2" step="1" oninput="(window.__dd_u&&window.__dd_u())"/>'+
        '<p class="readout" style="margin-top:8px;">'+(lang==='id'?'Jumlah paling mungkin (modus): ':'Most likely total (mode): ')+'<b id="dd-mode" style="color:#0891B2;"></b></p>'+
        '<div class="feedback" id="dd-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#dd-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('dd-after').style.display='block';
      document.getElementById('dd-fb').innerHTML=(b.dataset.v==='7'
        ?(lang==='id'?'<b>Tepat — 7.</b> ':'<b>Right — 7.</b> ')
        :(lang==='id'?'<b>Bukan '+b.dataset.v+'.</b> Jawabannya 7. ':'<b>Not '+b.dataset.v+'.</b> The answer is 7. '))+
        (lang==='id'
        ?'Ada 6 cara membuat 7 (1+6, 2+5, …) tapi cuma 1 cara membuat 2 atau 12. Karena hasilnya bisa dihitung satu-satu, tiap nilai punya peluang tersendiri (batang terpisah). Geser jumlah dadu: makin banyak dadu, bentuknya makin menyerupai lonceng — cikal bakal teorema limit pusat.'
        :'There are 6 ways to make 7 (1+6, 2+5, …) but only 1 way to make 2 or 12. Because outcomes are countable, each value has its own probability (separate bars). Slide the number of dice: with more dice the shape approaches a bell — a preview of the central limit theorem.');
      document.getElementById('dd-r').value='2'; draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Distribusi probabilitas diskrit', en:'Discrete probability distribution'}, sub:{id:'mis. Bernoulli, Binomial, Poisson', en:'e.g. Bernoulli, Binomial, Poisson'},
    def:{id:'Distribusi untuk variabel acak yang nilainya dapat dihitung (terpisah-pisah), di mana setiap nilai yang mungkin memiliki probabilitas tersendiri dan jumlah seluruh probabilitas sama dengan 1.', en:'A distribution for a random variable whose values are countable (separate), where each possible value carries its own probability and all probabilities sum to 1.'},
    formula:'P(X = k) = p(k),   Σ p(k) = 1,   E[X] = Σ k·p(k)',
    theory:{id:'Pada variabel diskrit, probabilitas menempel pada titik-titik tertentu, sehingga digambarkan sebagai batang, bukan kurva mulus. Bentuk distribusi muncul dari banyaknya “cara” suatu hasil dapat terjadi — itulah mengapa jumlah dua dadu memuncak di tengah. Saat banyak variabel acak independen dijumlahkan, distribusinya cenderung menuju bentuk lonceng (normal), apa pun bentuk awalnya.', en:'For a discrete variable, probability sits on specific points, so it is drawn as bars rather than a smooth curve. The shape of the distribution comes from how many “ways” an outcome can occur — which is why the sum of two dice peaks in the middle. When many independent random variables are added, their distribution tends toward a bell (normal) shape, whatever the starting shape.'},
    practice:{id:'Distribusi diskrit memodelkan hal-hal yang dihitung: jumlah klik, kedatangan pelanggan per jam (Poisson), banyaknya cacat, atau lolos/gagal (Bernoulli/Binomial). Memahami sebarannya membantu menilai apakah suatu hasil “wajar” atau mengejutkan. Hati-hati menyamakan “rata-rata” dengan “paling mungkin” — pada distribusi yang miring keduanya bisa berbeda.', en:'Discrete distributions model things you count: number of clicks, customer arrivals per hour (Poisson), defect counts, or pass/fail (Bernoulli/Binomial). Understanding the spread helps judge whether an outcome is “normal” or surprising. Be careful equating “average” with “most likely” — on a skewed distribution they can differ.'}
  }
});

/* ---------- 12. distribusi kontinu ---------- */
addConcept({
  id:'contdist', icon:'🔔', color:'#16A34A',
  cat:{id:'Probabilitas', en:'Probability'},
  title:{id:'Distribusi kontinu', en:'Continuous distribution'},
  tag:{id:'Peluang tinggi badan TEPAT 170,000… cm? Nol. Yang punya peluang hanyalah rentang.', en:'The probability of a height of EXACTLY 170.000… cm? Zero. Only ranges carry probability.'},
  hook:{id:'Tinggi badan tersebar normal dengan rata-rata 170 cm. Berapa peluang seseorang tingginya tepat 170 cm (sampai tak hingga desimal)?', en:'Heights are normally distributed with mean 170 cm. What is the probability someone is exactly 170 cm (to infinite decimals)?'},
  build:function(host,lang,reveal){
    var mu=170;
    function pdf(x,sd){return Math.exp(-0.5*Math.pow((x-mu)/sd,2))/(sd*Math.sqrt(2*Math.PI));}
    function draw(){
      var sd=+document.getElementById('cd-sd').value, a=+document.getElementById('cd-a').value, b=+document.getElementById('cd-b').value;
      if(a>b){var tmp=a;a=b;b=tmp;}
      document.getElementById('cd-sdv').textContent=sd; document.getElementById('cd-av').textContent=a; document.getElementById('cd-bv').textContent=b;
      var W=460,H=200,pad=26,xlo=140,xhi=200, mp=pdf(mu,sd);
      var X=function(x){return pad+(x-xlo)/(xhi-xlo)*(W-2*pad);}, Y=function(p){return H-pad-(p/(mp*1.1))*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      var area='M'+X(a).toFixed(1)+' '+Y(0).toFixed(1);for(var x=a;x<=b+1e-9;x+=0.5){area+=' L'+X(x).toFixed(1)+' '+Y(pdf(x,sd)).toFixed(1);}area+=' L'+X(b).toFixed(1)+' '+Y(0).toFixed(1)+' Z';
      s+='<path d="'+area+'" fill="#16A34A" opacity="0.5"/>';
      var cv='';for(var x2=xlo,f=true;x2<=xhi+1e-9;x2+=0.5){cv+=(f?'M':'L')+X(x2).toFixed(1)+' '+Y(pdf(x2,sd)).toFixed(1)+' ';f=false;}
      s+='<path d="'+cv+'" fill="none" stroke="#16A34A" stroke-width="2"/>';
      s+='<line x1="'+X(170).toFixed(1)+'" y1="'+Y(mp).toFixed(1)+'" x2="'+X(170).toFixed(1)+'" y2="'+Y(0).toFixed(1)+'" stroke="#94A3B8" stroke-dasharray="3,3"/>';
      s+='<text x="'+pad+'" y="'+(H-8)+'" font-size="9" fill="#94A3B8">140</text><text x="'+(W-pad)+'" y="'+(H-8)+'" text-anchor="end" font-size="9" fill="#94A3B8">200 cm</text>';
      s+='</svg>';
      document.getElementById('cd-plot').innerHTML=s;
      var P=normCdf((b-mu)/sd)-normCdf((a-mu)/sd);
      document.getElementById('cd-p').textContent=(P*100).toFixed(1)+'%';
    }
    window.__cd_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="cd-guess">'+
        '<button class="btn" data-v="5">'+(lang==='id'?'Sekitar 5%':'About 5%')+'</button>'+
        '<button class="btn" data-v="0">'+(lang==='id'?'Hampir 0':'Almost 0')+'</button>'+
        '<button class="btn" data-v="dep">'+(lang==='id'?'Tergantung':'It depends')+'</button>'+
      '</div>'+
      '<div id="cd-after" style="display:none;margin-top:16px;">'+
        '<div id="cd-plot"></div>'+
        '<p class="readout" style="margin:4px 0;">'+(lang==='id'?'Peluang hanya bermakna untuk <b>rentang</b> = luas area di bawah kurva.':'Probability is only meaningful for a <b>range</b> = the area under the curve.')+'</p>'+
        '<label class="fld">'+(lang==='id'?'Batas bawah: ':'Lower: ')+'<b id="cd-av">165</b> cm</label>'+
        '<input type="range" id="cd-a" min="140" max="200" value="165" step="1" oninput="(window.__cd_u&&window.__cd_u())"/>'+
        '<label class="fld" style="display:block;margin-top:4px;">'+(lang==='id'?'Batas atas: ':'Upper: ')+'<b id="cd-bv">175</b> cm</label>'+
        '<input type="range" id="cd-b" min="140" max="200" value="175" step="1" oninput="(window.__cd_u&&window.__cd_u())"/>'+
        '<label class="fld" style="display:block;margin-top:4px;">'+(lang==='id'?'Simpangan baku: ':'Std dev: ')+'<b id="cd-sdv">7</b> cm</label>'+
        '<input type="range" id="cd-sd" min="4" max="12" value="7" step="1" oninput="(window.__cd_u&&window.__cd_u())"/>'+
        '<p class="big" id="cd-pwrap" style="font-size:20px;margin-top:8px;">P(rentang) = <span id="cd-p" style="color:#16A34A;">52%</span></p>'+
        '<div class="feedback" id="cd-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#cd-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('cd-after').style.display='block';
      document.getElementById('cd-fb').innerHTML=(b.dataset.v==='0'
        ?(lang==='id'?'<b>Benar — hampir nol.</b> ':'<b>Correct — almost zero.</b> ')
        :(lang==='id'?'<b>Mengejutkan, ya?</b> Jawabannya hampir nol. ':'<b>Surprising, right?</b> The answer is almost zero. '))+
        (lang==='id'
        ?'Pada variabel kontinu, ada tak hingga banyak nilai yang mungkin, sehingga peluang tepat satu titik = 0. Yang bermakna hanyalah peluang sebuah <i>rentang</i>, yaitu luas area di bawah kurva. Geser batas bawah dan atas untuk melihat peluang berubah; perlebar rentang → peluang naik. Itu sebabnya tinggi badan selalu dilaporkan sebagai “antara 168–172 cm”, bukan satu angka pasti.'
        :'For a continuous variable there are infinitely many possible values, so the probability of any exact point = 0. Only the probability of a <i>range</i> is meaningful — the area under the curve. Slide the lower and upper bounds to watch it change; widen the range and the probability rises. That is why heights are always reported as “between 168–172 cm”, never one exact number.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Distribusi probabilitas kontinu', en:'Continuous probability distribution'}, sub:{id:'mis. Normal/Gauss, Eksponensial', en:'e.g. Normal/Gaussian, Exponential'},
    def:{id:'Distribusi untuk variabel acak yang nilainya berkesinambungan (tak terhitung). Probabilitas dinyatakan sebagai luas di bawah kurva kepadatan (PDF), dan peluang pada satu titik tunggal selalu nol.', en:'A distribution for a random variable whose values form a continuum (uncountable). Probability is expressed as area under a density curve (PDF), and the probability at any single point is always zero.'},
    formula:'P(a ≤ X ≤ b) = ∫ₐᵇ f(x) dx,   ∫ f(x) dx = 1,   P(X = x) = 0',
    theory:{id:'Fungsi kepadatan f(x) bukan probabilitas itu sendiri — ia bisa bernilai lebih dari 1; yang merupakan probabilitas adalah luas (integral) di bawahnya pada suatu rentang. Tinggi kurva hanya menunjukkan kepadatan relatif. Distribusi normal istimewa karena teorema limit pusat: jumlah/rata-rata banyak pengaruh acak kecil cenderung berbentuk lonceng, dengan aturan praktis 68–95–99,7% untuk 1–2–3 simpangan baku.', en:'The density f(x) is not a probability itself — it can exceed 1; what is a probability is the area (integral) under it over a range. The height of the curve only shows relative density. The normal distribution is special because of the central limit theorem: sums/averages of many small random influences tend toward a bell shape, with the 68–95–99.7% rule of thumb for 1–2–3 standard deviations.'},
    practice:{id:'Distribusi kontinu memodelkan besaran yang diukur: tinggi, berat, waktu, suhu, harga. Menghitung peluang berarti menghitung luas — mis. “berapa persen produk di luar toleransi?”. Hati-hati: tidak semua data berbentuk normal (pendapatan dan waktu tunggu sering miring), jadi jangan asal menempelkan kurva lonceng tanpa memeriksa bentuk datanya.', en:'Continuous distributions model measured quantities: height, weight, time, temperature, price. Computing a probability means computing an area — e.g. “what percent of products fall outside tolerance?”. Beware: not all data are normal (incomes and waiting times are often skewed), so do not slap a bell curve on data without checking its shape.'}
  }
});

/* ---------- 13. regresi logistik ---------- */
addConcept({
  id:'logreg', icon:'📐', color:'#DB2777',
  cat:{id:'Model & prediksi', en:'Models & prediction'},
  title:{id:'Regresi logistik', en:'Logistic regression'},
  tag:{id:'Saat hasilnya “ya/tidak”, garis lurus gagal — solusinya kurva-S yang memencet peluang ke 0–1.', en:'When the outcome is “yes/no”, a straight line fails — the fix is an S-curve that squeezes probability into 0–1.'},
  hook:{id:'Jam belajar memprediksi lulus/tidak (0/1). Kalau kita pakai garis lurus biasa, peluang lulus bisa keluar dari 100% atau jadi negatif. Bagaimana solusinya?', en:'Hours studied predict pass/fail (0/1). With an ordinary straight line, the predicted probability can exceed 100% or go negative. What is the fix?'},
  build:function(host,lang,reveal){
    var data=[[1,0],[2,0],[3,0],[4,0],[4,1],[5,0],[5,1],[6,1],[7,0],[7,1],[8,1],[9,1],[10,1]];
    var b0=-6, b1=1.2;
    function sig(z){return 1/(1+Math.exp(-z));}
    function p(x){return sig(b0+b1*x);}
    function draw(){
      var thr=+document.getElementById('lg-r').value;
      document.getElementById('lg-tv').textContent=(thr*100).toFixed(0)+'%';
      var bound=(Math.log(thr/(1-thr))-b0)/b1;
      var W=460,H=220,pad=30,xlo=0,xhi=11;
      var X=function(x){return pad+(x-xlo)/(xhi-xlo)*(W-2*pad);}, Y=function(pp){return H-pad-pp*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      s+='<line x1="'+pad+'" y1="'+Y(0).toFixed(1)+'" x2="'+(W-pad)+'" y2="'+Y(0).toFixed(1)+'" stroke="#E2E8F0"/>';
      s+='<line x1="'+pad+'" y1="'+Y(1).toFixed(1)+'" x2="'+(W-pad)+'" y2="'+Y(1).toFixed(1)+'" stroke="#E2E8F0"/>';
      s+='<line x1="'+pad+'" y1="'+Y(thr).toFixed(1)+'" x2="'+(W-pad)+'" y2="'+Y(thr).toFixed(1)+'" stroke="#DB2777" stroke-dasharray="4,3"/>';
      if(bound>xlo&&bound<xhi)s+='<line x1="'+X(bound).toFixed(1)+'" y1="'+pad+'" x2="'+X(bound).toFixed(1)+'" y2="'+(H-pad)+'" stroke="#0F172A" stroke-dasharray="2,2"/>';
      var cv='';for(var x=xlo,f=true;x<=xhi+1e-9;x+=0.1){cv+=(f?'M':'L')+X(x).toFixed(1)+' '+Y(p(x)).toFixed(1)+' ';f=false;}
      s+='<path d="'+cv+'" fill="none" stroke="#DB2777" stroke-width="2.4"/>';
      var correct=0;
      data.forEach(function(d){var pred=p(d[0])>=thr?1:0;if(pred===d[1])correct++;var col=d[1]?'#16A34A':'#EF4444';
        s+='<circle cx="'+X(d[0]).toFixed(1)+'" cy="'+Y(d[1]).toFixed(1)+'" r="4.5" fill="'+col+'" opacity="0.8"/>';});
      s+='<text x="'+(pad-4)+'" y="'+Y(1).toFixed(1)+'" text-anchor="end" font-size="9" fill="#94A3B8">lulus</text>';
      s+='<text x="'+(pad-4)+'" y="'+Y(0).toFixed(1)+'" text-anchor="end" font-size="9" fill="#94A3B8">gagal</text>';
      s+='<text x="'+(W-pad)+'" y="'+(H-8)+'" text-anchor="end" font-size="9" fill="#94A3B8">'+(lang==='id'?'jam belajar':'hours')+'</text>';
      s+='</svg>';
      document.getElementById('lg-plot').innerHTML=s;
      document.getElementById('lg-bound').textContent=(bound>0?bound.toFixed(1):'0')+(lang==='id'?' jam':' h');
      document.getElementById('lg-acc').textContent=(correct/data.length*100).toFixed(0)+'%';
    }
    window.__lg_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="lg-guess">'+
        '<button class="btn" data-v="line">'+(lang==='id'?'Pakai garis lurus saja':'Just use a straight line')+'</button>'+
        '<button class="btn" data-v="curve">'+(lang==='id'?'Perlu kurva dibatasi 0–1':'Need a curve bounded 0–1')+'</button>'+
      '</div>'+
      '<div id="lg-after" style="display:none;margin-top:16px;">'+
        '<div id="lg-plot"></div>'+
        '<p class="readout" style="margin:4px 0;">'+(lang==='id'?'Kurva-S (sigmoid) memetakan jam belajar → peluang lulus, selalu di antara 0 dan 1.':'The S-curve (sigmoid) maps hours → probability of passing, always between 0 and 1.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Ambang keputusan: ':'Decision threshold: ')+'<b id="lg-tv">50%</b></label>'+
        '<input type="range" id="lg-r" min="0.1" max="0.9" value="0.5" step="0.05" oninput="(window.__lg_u&&window.__lg_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#FCE7F3;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Batas keputusan':'Decision boundary')+'</div><div class="big" id="lg-bound" style="font-size:20px;color:#DB2777;"></div></div>'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Akurasi':'Accuracy')+'</div><div class="big" id="lg-acc" style="font-size:20px;color:#16A34A;"></div></div>'+
        '</div>'+
        '<div class="feedback" id="lg-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#lg-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('lg-after').style.display='block';
      document.getElementById('lg-fb').innerHTML=(lang==='id'
        ?'Garis lurus bisa menembus 100% atau di bawah 0% — tak masuk akal untuk peluang. Regresi logistik membungkus garis lurus (β₀+β₁x) ke dalam fungsi <b>sigmoid</b> yang selalu menghasilkan 0–1. Geser ambang keputusan: menurunkannya menangkap lebih banyak yang lulus tapi juga lebih banyak salah vonis. Batas keputusan bergeser, akurasi berubah.'
        :'A straight line can shoot past 100% or below 0% — nonsensical for a probability. Logistic regression wraps the straight line (β₀+β₁x) in a <b>sigmoid</b> that always outputs 0–1. Slide the decision threshold: lowering it catches more passers but also more false calls. The decision boundary shifts and accuracy changes.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Regresi logistik', en:'Logistic regression'}, sub:{id:'David Cox, 1958', en:'David Cox, 1958'},
    def:{id:'Model untuk memprediksi hasil biner (ya/tidak) dengan memodelkan peluang kejadian sebagai fungsi sigmoid dari kombinasi linier prediktor, sehingga keluarannya selalu berada di antara 0 dan 1.', en:'A model for predicting a binary outcome (yes/no) by modeling the probability of the event as a sigmoid function of a linear combination of predictors, so the output always lies between 0 and 1.'},
    formula:'P(y=1) = 1 / (1 + e^−(<span class="v">β₀</span>+<span class="v">β₁</span>x))   ·   log( p/(1−p) ) = β₀+β₁x',
    theory:{id:'Trik utamanya adalah memodelkan log-odds (logit) secara linier, bukan peluangnya langsung. Fungsi sigmoid adalah kebalikan logit: ia memencet seluruh garis bilangan ke rentang (0,1). Koefisien β₁ ditafsirkan sebagai perubahan log-odds per satu satuan x; e^β₁ adalah rasio odds. Model dilatih dengan maximum likelihood, bukan kuadrat terkecil.', en:'The key trick is to model the log-odds (logit) linearly, not the probability directly. The sigmoid is the inverse of the logit: it squeezes the entire number line into the range (0,1). The coefficient β₁ is read as the change in log-odds per one unit of x; e^β₁ is the odds ratio. The model is trained with maximum likelihood, not least squares.'},
    practice:{id:'Regresi logistik adalah fondasi klasifikasi: deteksi penipuan, prediksi churn, diagnosis medis, skor kredit. Pemilihan ambang keputusan adalah keputusan bisnis, bukan statistik — menukar antara false positive dan false negative sesuai biayanya (lihat kurva ROC). Akurasi bisa menyesatkan pada kelas yang timpang; gunakan juga precision, recall, dan AUC.', en:'Logistic regression is the foundation of classification: fraud detection, churn prediction, medical diagnosis, credit scoring. Choosing the decision threshold is a business decision, not a statistical one — trading off false positives and false negatives by their costs (see the ROC curve). Accuracy can mislead on imbalanced classes; also use precision, recall, and AUC.'}
  }
});

/* ---------- 14. statistical inference ---------- */
addConcept({
  id:'statinf', icon:'🔬', color:'#0284C7',
  cat:{id:'Inferensi', en:'Inference'},
  title:{id:'Inferensi statistik', en:'Statistical inference'},
  tag:{id:'Menebak sifat seluruh populasi hanya dari segenggam sampel — dan tahu seberapa yakin kita boleh.', en:'Guessing a whole population from a handful of samples — and knowing how confident we may be.'},
  hook:{id:'Untuk menebak rata-rata tinggi 50 juta orang, apakah sampel 30 orang sudah bisa memberi perkiraan yang berguna?', en:'To estimate the mean height of 50 million people, can a sample of 30 already give a useful estimate?'},

      '<div class="btn-row" id="si-guess">'+
        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, cukup':'Yes, enough')+'</button>'+
        '<button class="btn" data-v="no">'+(lang==='id'?'Tidak, terlalu sedikit':'No, too few')+'</button>'+
      '</div>'+
      '<div id="si-after" style="display:none;margin-top:16px;">'+
        '<div id="si-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Titik biru = perkiraan dari sampel; garis biru = ketidakpastian (margin 95%).':'Blue dot = estimate from the sample; blue bar = uncertainty (95% margin).')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Ukuran sampel n: ':'Sample size n: ')+'<b id="si-n">30</b></label>'+
        '<input type="range" id="si-r" min="5" max="500" value="30" step="1" oninput="(window.__si_u&&window.__si_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#EFF6FF;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Perkiraan':'Estimate')+'</div><div class="big" id="si-est" style="font-size:22px;color:#0284C7;"></div></div>'+
          '<div style="background:#F1F5F9;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Margin (±)':'Margin (±)')+'</div><div class="big" id="si-marg" style="font-size:22px;"></div></div>'+
        '</div>'+
        '<div class="feedback" id="si-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#si-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('si-after').style.display='block';
      document.getElementById('si-fb').innerHTML=(lang==='id'
        ?'Yang menentukan ketelitian adalah <b>ukuran sampel</b> (n), bukan ukuran populasi. Bahkan n=30 sudah memberi perkiraan berguna; margin menyusut seperti 1/√n, jadi melipatempatkan sampel hanya menyeparuh marginnya. Menebak rata-rata 50 juta orang dan 50 ribu orang butuh sampel yang kira-kira sama besarnya.'
        :'What determines precision is the <b>sample size</b> (n), not the population size. Even n=30 gives a useful estimate; the margin shrinks like 1/√n, so quadrupling the sample only halves the margin. Estimating the mean of 50 million people and of 50 thousand needs roughly the same sample size.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Inferensi statistik', en:'Statistical inference'}, sub:{id:'Fisher, Neyman, Pearson', en:'Fisher, Neyman, Pearson'},
    def:{id:'Proses menarik kesimpulan tentang parameter populasi yang tidak diketahui berdasarkan data sampel, sekaligus menyatakan tingkat ketidakpastian dari kesimpulan itu.', en:'The process of drawing conclusions about unknown population parameters from sample data, while quantifying the uncertainty of those conclusions.'},
    formula:'X̄ ± z* · (σ / √n)   ·   margin ∝ 1/√n   (bukan 1/N)',
    theory:{id:'Inti inferensi adalah memisahkan sinyal dari derau: estimasi titik memberi tebakan terbaik, sedangkan selang kepercayaan dan uji hipotesis menyatakan seberapa jauh tebakan itu bisa meleset. Ketelitian dikendalikan oleh ragam data dan akar ukuran sampel, bukan oleh besar populasi (selama populasi jauh lebih besar dari sampel). Karena itu jajak pendapat nasional dan kota bisa memakai jumlah responden yang mirip.', en:'The core of inference is separating signal from noise: a point estimate gives the best guess, while confidence intervals and hypothesis tests state how far that guess could be off. Precision is governed by data variance and the square root of sample size, not by population size (as long as the population is far larger than the sample). That is why a national poll and a city poll can use similar respondent counts.'},
    practice:{id:'Syarat utamanya adalah sampel yang representatif (acak) — tanpa itu, rumus margin yang rapi pun menipu (lihat bias sampling). Laporkan selalu ketidakpastian, bukan hanya angka tunggal, dan bedakan signifikansi statistik dari pentingnya praktis. Inferensi yang baik dimulai dari desain pengumpulan data yang baik, bukan dari analisis yang canggih di belakang.', en:'The key requirement is a representative (random) sample — without it, even a tidy margin formula deceives (see sampling bias). Always report uncertainty, not just a single number, and separate statistical significance from practical importance. Good inference starts with good data-collection design, not clever analysis afterward.'}
  }
});

/* ---------- 15. decision tree ---------- */
addConcept({
  id:'dtree', icon:'🌳', color:'#15803D',
  cat:{id:'Model & prediksi', en:'Models & prediction'},
  title:{id:'Decision tree', en:'Decision tree'},
  tag:{id:'Serangkaian pertanyaan ya/tidak yang membelah data — tapi pohon yang terlalu dalam justru menghafal, bukan belajar.', en:'A chain of yes/no questions that split the data — but a too-deep tree memorizes instead of learning.'},
  hook:{id:'Sebuah decision tree memprediksi dengan membelah data berulang kali. Apakah pohon yang lebih dalam (lebih banyak belahan) selalu lebih akurat?', en:'A decision tree predicts by splitting the data over and over. Is a deeper tree (more splits) always more accurate?'},

    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+

        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, makin dalam makin baik':'Yes, deeper is better')+'</button>'+

      '<div id="dt-after" style="display:none;margin-top:16px;">'+
        '<div id="dt-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Tiap belahan memotong ruang jadi kotak. Makin dalam → batas makin rumit.':'Each split cuts the space into boxes. Deeper → more complex boundary.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Kedalaman pohon: ':'Tree depth: ')+'<b id="dt-d">2</b></label>'+
        '<input type="range" id="dt-r" min="1" max="5" value="2" step="1" oninput="(window.__dt_u&&window.__dt_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#EFF6FF;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Akurasi data latih':'Train accuracy')+'</div><div class="big" id="dt-tr" style="font-size:20px;color:#2563EB;"></div></div>'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Akurasi data baru':'Test accuracy')+'</div><div class="big" id="dt-te" style="font-size:20px;color:#16A34A;"></div></div>'+
        '</div>'+
        '<div class="feedback" id="dt-fb" style="display:block;"></div>'+

      document.getElementById('dt-fb').innerHTML=(lang==='id'
        ?'Geser kedalaman: akurasi data <b>latih</b> terus naik sampai 100% (pohon hafal semua), tapi akurasi data <b>baru</b> memuncak di kedalaman ~3 lalu turun. Itulah <b>overfitting</b> — pohon mulai menghafal derau, bukan pola. Pohon dangkal mudah ditafsirkan tapi bisa terlalu sederhana; pohon dalam fleksibel tapi rapuh.'
        :'Slide the depth: <b>train</b> accuracy keeps rising to 100% (the tree memorizes everything), but accuracy on <b>new</b> data peaks around depth ~3 then falls. That is <b>overfitting</b> — the tree starts memorizing noise, not patterns. Shallow trees are interpretable but may be too simple; deep trees are flexible but brittle.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Decision tree (pohon keputusan)', en:'Decision tree'}, sub:{id:'Breiman dkk., 1984 (CART)', en:'Breiman et al., 1984 (CART)'},
    def:{id:'Model prediksi yang membuat keputusan lewat serangkaian pertanyaan bercabang pada fitur data, membelah data menjadi kelompok yang makin homogen hingga mencapai sebuah prediksi di daun pohon.', en:'A predictive model that makes decisions through a branching series of questions on data features, splitting the data into increasingly homogeneous groups until reaching a prediction at a leaf.'},
    formula:'pilih belahan yang paling memurnikan kelompok<br>(min impuritas: Gini / entropi)',
    theory:{id:'Pada tiap simpul, algoritme memilih fitur dan ambang yang paling “memurnikan” kelompok (mengurangi keberagaman kelas), lalu mengulanginya secara rekursif. Kelebihannya: mudah ditafsirkan dan menangkap interaksi non-linier tanpa banyak asumsi. Kelemahan utamanya: variansnya tinggi — pohon yang dibiarkan tumbuh dalam akan menghafal data latih (overfit), sehingga butuh pemangkasan (pruning) atau batas kedalaman.', en:'At each node, the algorithm picks the feature and threshold that best “purifies” the groups (reducing class mixing), then repeats recursively. Strengths: easy to interpret and captures non-linear interactions without many assumptions. Main weakness: high variance — a tree allowed to grow deep will memorize the training data (overfit), so it needs pruning or a depth limit.'},
    practice:{id:'Pohon keputusan dipakai untuk skor kredit, triase medis, dan aturan bisnis karena hasilnya bisa dijelaskan sebagai “jika–maka”. Tapi satu pohon jarang dipakai sendirian dalam prediksi serius justru karena rawan overfit dan tidak stabil (perubahan kecil pada data mengubah seluruh struktur). Solusi umumnya menggabungkan banyak pohon — itulah random forest.', en:'Decision trees are used for credit scoring, medical triage, and business rules because the output can be explained as “if–then”. But a single tree is rarely used alone for serious prediction precisely because it overfits and is unstable (small data changes reshape the whole tree). The common fix is to combine many trees — that is random forest.'}
  }
});

/* ---------- 16. random forest ---------- */
addConcept({
  id:'rforest', icon:'🌲', color:'#166534',
  cat:{id:'Model & prediksi', en:'Models & prediction'},
  title:{id:'Random forest', en:'Random forest'},
  tag:{id:'Satu pohon labil. Tapi ratusan pohon biasa yang memilih bersama menghasilkan prediksi yang jauh lebih stabil.', en:'One tree is shaky. But hundreds of ordinary trees voting together give a far steadier prediction.'},
  hook:{id:'Mana yang lebih andal: satu decision tree yang dioptimalkan habis-habisan, atau rata-rata dari banyak pohon yang masing-masing biasa saja?', en:'Which is more reliable: one heavily-optimized decision tree, or the average of many individually-mediocre trees?'},
  build:function(host,lang,reveal){
    function draw(){
      var nt=Math.round(+document.getElementById('rf-r').value);
      var W=460,H=170,pad=20, amp=26/Math.sqrt(nt);
      var X=function(t){return pad+t/40*(W-2*pad);}, Y=function(v){return H/2-v;};

      var pc='';for(var t2=0;t2<=40;t2++){var noise=(rng()-0.5)*2*amp*3;pc+=(t2?'L':'M')+X(t2).toFixed(1)+' '+Y(truef(t2)+noise).toFixed(1)+' ';}
      s+='<path d="'+pc+'" fill="none" stroke="#166534" stroke-width="2"/>';
      s+='</svg>';
      document.getElementById('rf-plot').innerHTML=s;
      document.getElementById('rf-nt').textContent=nt;
      document.getElementById('rf-acc').textContent=(88-12/Math.sqrt(nt)).toFixed(1)+'%';

    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="rf-guess">'+
        '<button class="btn" data-v="one">'+(lang==='id'?'Satu pohon hebat':'One great tree')+'</button>'+
        '<button class="btn" data-v="many">'+(lang==='id'?'Banyak pohon biasa':'Many ordinary trees')+'</button>'+
      '</div>'+
      '<div id="rf-after" style="display:none;margin-top:16px;">'+
        '<div id="rf-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Abu-abu = pola sejati; hijau = prediksi gabungan. Makin banyak pohon → makin mulus mengikuti pola.':'Gray = true pattern; green = combined prediction. More trees → smoother tracking of the pattern.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Jumlah pohon: ':'Number of trees: ')+'<b id="rf-nt">1</b></label>'+
        '<input type="range" id="rf-r" min="1" max="200" value="1" step="1" oninput="(window.__rf_u&&window.__rf_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Akurasi':'Accuracy')+'</div><div class="big" id="rf-acc" style="font-size:20px;color:#166534;"></div></div>'+
          '<div style="background:#F1F5F9;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Variansi prediksi':'Prediction variance')+'</div><div class="big" id="rf-var" style="font-size:20px;"></div></div>'+
        '</div>'+
        '<div class="feedback" id="rf-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#rf-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('rf-after').style.display='block';
      document.getElementById('rf-fb').innerHTML=(lang==='id'
        ?'Geser jumlah pohon: prediksi gabungan makin mulus dan stabil, variansinya turun seperti 1/√(jumlah pohon). Tiap pohon dilatih pada sampel acak dan fitur acak, jadi kesalahan mereka tidak kompak — saat dirata-rata, derau saling meniadakan sementara sinyal bertahan. “Kebijaksanaan orang banyak” untuk model.'
        :'Slide the number of trees: the combined prediction grows smoother and steadier, its variance falling like 1/√(number of trees). Each tree trains on a random sample and random features, so their errors are not aligned — when averaged, noise cancels out while signal survives. The “wisdom of crowds” for models.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Random forest', en:'Random forest'}, sub:{id:'Leo Breiman, 2001', en:'Leo Breiman, 2001'},
    def:{id:'Model ensembel yang membangun banyak decision tree pada sampel data dan subset fitur yang diacak, lalu menggabungkan prediksinya (suara terbanyak atau rata-rata) untuk mengurangi varians dan overfitting.', en:'An ensemble model that builds many decision trees on randomized data samples and feature subsets, then combines their predictions (majority vote or average) to reduce variance and overfitting.'},
    formula:'prediksi = rata-rata / suara dari B pohon<br>Var(rata-rata) ↓ saat pohon-pohon kurang berkorelasi',
    theory:{id:'Idenya adalah bagging: melatih tiap pohon pada sampel bootstrap berbeda dan hanya mengizinkan subset fitur acak di tiap belahan. Pengacakan ganda ini membuat pohon-pohon kurang berkorelasi, sehingga ketika dirata-rata, varians turun drastis tanpa menambah bias berarti. Hasilnya: model yang mempertahankan fleksibilitas pohon tetapi jauh lebih stabil dan tahan overfitting.', en:'The idea is bagging: train each tree on a different bootstrap sample and allow only a random subset of features at each split. This double randomization makes the trees less correlated, so averaging them slashes variance without adding much bias. The result: a model that keeps the flexibility of trees but is far more stable and resistant to overfitting.'},
    practice:{id:'Random forest adalah pilihan andalan untuk data tabular: kuat, sedikit penyetelan, dan memberi peringkat pentingnya fitur. Harganya adalah hilangnya keterbacaan satu pohon — kita menukar interpretasi mudah dengan akurasi dan kestabilan. Untuk kasus yang menuntut penjelasan per keputusan, padukan dengan alat seperti SHAP, atau pertimbangkan model yang lebih sederhana.', en:'Random forest is a go-to for tabular data: robust, low-tuning, and it ranks feature importance. The cost is losing a single tree’s readability — you trade easy interpretation for accuracy and stability. For cases needing per-decision explanations, pair it with tools like SHAP, or consider a simpler model.'}
  }
});

addConcept({

      '</div>'+
      '<div id="nv-after" style="display:none;margin-top:16px;">'+
        '<div id="nv-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Kuning = jendela pengukuran. Geser untuk memperpanjang eksperimen.':'Yellow = measurement window. Slide to run the experiment longer.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Lama eksperimen (hari): ':'Experiment length (days): ')+'<b id="nv-win">7</b></label>'+

        :'Slide the experiment length right: the measured lift falls from +40% toward near zero. The early spike is mostly curiosity about the new thing, not lasting value. Stopping an A/B test too early massively overstates the impact. Run it long enough for the novelty to wear off.');

  concept:{
    name:{id:'Novelty effect', en:'Novelty effect'}, sub:{id:'psikologi & eksperimen produk', en:'psychology & product experiments'},
    def:{id:'Kecenderungan pengguna merespons lebih kuat terhadap sesuatu hanya karena baru, menghasilkan lonjakan sementara pada metrik yang meluruh kembali ke garis dasar seiring kebaruan memudar.', en:'The tendency for users to respond more strongly to something simply because it is new, producing a temporary spike in metrics that decays back toward baseline as the novelty fades.'},
    formula:'efek(t) ≈ efek_jangka_panjang + lonjakan · e^(−t/τ)',
    theory:{id:'Respons awal mencampur dua komponen: nilai sejati fitur dan dorongan rasa ingin tahu yang fana. Karena komponen kebaruan meluruh (sering secara eksponensial), estimasi yang diambil dari jendela waktu pendek bias ke atas. Cerminannya adalah change aversion, ketika perubahan justru menekan metrik sementara sebelum pulih. Keduanya membuat efek jangka pendek menyesatkan.', en:'The initial response mixes two components: the feature’s true value and a fleeting curiosity boost. Because the novelty component decays (often exponentially), an estimate taken from a short window is biased upward. Its mirror image is change aversion, where a change temporarily depresses metrics before recovering. Both make short-term effects misleading.'},
    practice:{id:'Jalankan eksperimen cukup lama hingga kurva mendatar, dan periksa khusus pengguna baru vs lama (efek kebaruan paling kuat pada pengguna lama yang terbiasa). Pertimbangkan periode “burn-in” sebelum mulai mengukur. Pelajaran umumnya: waspadai metrik yang indah di minggu pertama peluncuran apa pun.', en:'Run experiments long enough for the curve to flatten, and check new vs existing users separately (the novelty effect is strongest for long-time users used to the old way). Consider a “burn-in” period before you start measuring. The general lesson: be wary of beautiful first-week metrics on any launch.'}
  }
});

    formula:'pengacakan ⇒ E[perancu | perlakuan] sama di semua kelompok<br>⇒ selisih hasil = efek kausal',
    theory:{id:'Pada data observasi, perlakuan dan hasil sama-sama dipengaruhi perancu, sehingga korelasi bukan sebab. Pengacakan memutus tautan itu: karena penugasan tidak bergantung pada sifat subjek, kedua kelompok setara secara rata-rata pada segala hal lain — termasuk perancu yang bahkan tidak kita ketahui. Inilah mengapa uji acak terkontrol dianggap standar emas bukti kausal.', en:'In observational data, both treatment and outcome are influenced by confounders, so correlation is not cause. Randomization severs that link: because assignment does not depend on subjects’ traits, the two groups are equal on average in everything else — including confounders we do not even know about. This is why randomized controlled trials are considered the gold standard of causal evidence.'},

  }
});

/* ---------- 19. stationarity ---------- */
addConcept({
  id:'station', icon:'🌊', color:'#0369A1',
  cat:{id:'Deret waktu', en:'Time series'},
  title:{id:'Stasioneritas', en:'Stationarity'},
  tag:{id:'Kebanyakan model deret waktu menuntut “aturan main yang tetap”. Tren naik diam-diam melanggarnya.', en:'Most time-series models demand the “rules stay constant”. An upward trend quietly breaks that.'},
  hook:{id:'Sebuah deret waktu naik terus (ada tren). Bisakah model peramalan standar langsung dipakai pada deret seperti ini?', en:'A time series keeps trending upward. Can a standard forecasting model be applied directly to a series like this?'},
  build:function(host,lang,reveal){
    var rng=mulberry32(21), noise=[]; for(var i=0;i<80;i++) noise.push(gauss(rng)*5);
    function draw(){
      var tr=+document.getElementById('st-tr').value, se=+document.getElementById('st-se').value;
      var ser=[]; for(var t=0;t<80;t++){ser.push(60+tr*t*0.5+se*14*Math.sin(t/6)+noise[t]);}
      var W=460,H=180,pad=26, lo=Math.min.apply(null,ser)-5, hi=Math.max.apply(null,ser)+5;
      var X=function(t){return pad+t/79*(W-2*pad);}, Y=function(v){return H-pad-(v-lo)/(hi-lo)*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      var sp='';for(var t2=0;t2<80;t2++){sp+=(t2?'L':'M')+X(t2).toFixed(1)+' '+Y(ser[t2]).toFixed(1)+' ';}
      s+='<path d="'+sp+'" fill="none" stroke="#0369A1" stroke-width="1.8"/>';
      var rm='';for(var t3=0;t3<80;t3++){var a=Math.max(0,t3-6),sum=0,c=0;for(var k=a;k<=t3;k++){sum+=ser[k];c++;}rm+=(t3?'L':'M')+X(t3).toFixed(1)+' '+Y(sum/c).toFixed(1)+' ';}
      s+='<path d="'+rm+'" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>';
      s+='</svg>';
      document.getElementById('st-plot').innerHTML=s;
      var stat=(tr<0.15 && se<0.2);
      var el=document.getElementById('st-stat');
      el.textContent= stat ? (lang==='id'?'Stasioner ✓':'Stationary ✓') : (lang==='id'?'Tidak stasioner ✗':'Non-stationary ✗');
      el.style.color= stat ? '#16A34A':'#EF4444';
    }
    window.__st_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="st-guess">'+
        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, langsung bisa':'Yes, directly')+'</button>'+
        '<button class="btn" data-v="no">'+(lang==='id'?'Tidak, harus diolah dulu':'No, transform first')+'</button>'+
      '</div>'+
      '<div id="st-after" style="display:none;margin-top:16px;">'+
        '<div id="st-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Garis merah = rata-rata bergerak. Kalau ia menanjak/berayun, mean berubah → tidak stasioner.':'Red line = rolling mean. If it drifts or swings, the mean changes → non-stationary.')+'</p>'+
        '<label class="fld">'+(lang==='id'?'Kekuatan tren':'Trend strength')+'</label>'+
        '<input type="range" id="st-tr" min="0" max="1" value="0.6" step="0.05" oninput="(window.__st_u&&window.__st_u())"/>'+
        '<label class="fld" style="display:block;margin-top:4px;">'+(lang==='id'?'Kekuatan musiman':'Seasonality strength')+'</label>'+
        '<input type="range" id="st-se" min="0" max="1" value="0.3" step="0.05" oninput="(window.__st_u&&window.__st_u())"/>'+
        '<p class="big" id="st-statwrap" style="font-size:20px;margin-top:8px;">'+(lang==='id'?'Status: ':'Status: ')+'<span id="st-stat"></span></p>'+
        '<div class="feedback" id="st-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#st-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('st-after').style.display='block';
      document.getElementById('st-fb').innerHTML=(lang==='id'
        ?'Turunkan kedua slider ke nol: rata-rata bergerak (merah) mendatar → deret stasioner, sifatnya tetap sepanjang waktu, dan model seperti ARIMA bisa dipakai. Naikkan tren atau musiman: mean berubah seiring waktu → tidak stasioner. Solusinya: hilangkan tren (differencing) atau buang pola musiman dulu sebelum memodelkan.'
        :'Drop both sliders to zero: the rolling mean (red) flattens → the series is stationary, its properties constant over time, and models like ARIMA can be used. Raise trend or seasonality: the mean changes over time → non-stationary. The fix: remove the trend (differencing) or strip the seasonal pattern before modeling.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Stasioneritas', en:'Stationarity'}, sub:{id:'fondasi analisis deret waktu', en:'foundation of time-series analysis'},
    def:{id:'Sifat sebuah deret waktu yang sifat statistiknya — rata-rata, ragam, dan struktur autokorelasi — tidak berubah sepanjang waktu.', en:'The property of a time series whose statistical characteristics — mean, variance, and autocorrelation structure — do not change over time.'},
    formula:'mean, ragam, autokovariansi konstan terhadap waktu<br>(tidak bergantung pada t)',
    theory:{id:'Banyak metode peramalan klasik (AR, MA, ARIMA) mengasumsikan masa depan mengikuti “aturan main” yang sama dengan masa lalu — itulah stasioneritas. Tren membuat mean bergeser, sedangkan musiman dan ragam yang membesar juga melanggar asumsi ini. Akibatnya, korelasi pada data non-stasioner bisa palsu (spurious): dua deret yang sama-sama menanjak akan tampak berkorelasi padahal tak berhubungan.', en:'Many classical forecasting methods (AR, MA, ARIMA) assume the future follows the same “rules” as the past — that is stationarity. A trend shifts the mean, while seasonality and growing variance also violate the assumption. As a result, correlations on non-stationary data can be spurious: two series that both trend upward will appear correlated even if unrelated.'},
    practice:{id:'Sebelum memodelkan deret waktu, periksa stasioneritas (plot, rata-rata bergerak, atau uji seperti ADF). Bila tidak stasioner, ubah dulu: differencing untuk menghapus tren, transformasi log untuk menstabilkan ragam, atau penyesuaian musiman. Mengabaikan langkah ini adalah sumber umum peramalan dan regresi yang menyesatkan.', en:'Before modeling a time series, check stationarity (plots, rolling means, or tests like ADF). If it is non-stationary, transform first: differencing to remove trend, a log transform to stabilize variance, or seasonal adjustment. Skipping this step is a common source of misleading forecasts and regressions.'}
  }
});

/* ---------- 20. moving average ---------- */
addConcept({
  id:'movavg', icon:'📉', color:'#2563EB',
  cat:{id:'Deret waktu', en:'Time series'},
  title:{id:'Moving average', en:'Moving average'},
  tag:{id:'Merata-rata jendela waktu meredam derau — tapi jendela terlalu lebar bikin garis telat dan tumpul.', en:'Averaging a time window smooths noise — but too wide a window makes the line late and dull.'},
  hook:{id:'Untuk menghaluskan data yang berisik, apakah jendela rata-rata yang makin lebar selalu makin baik?', en:'To smooth noisy data, is a wider averaging window always better?'},
  build:function(host,lang,reveal){
    var rng=mulberry32(31), N=60, sig=[], noisy=[];
    for(var t=0;t<N;t++){var base=60+30*Math.exp(-Math.pow((t-30)/12,2))*1; sig.push(60+34*Math.exp(-Math.pow((t-28)/10,2))); noisy.push(sig[t]+gauss(rng)*7);}
    function ma(w){var out=[];for(var t=0;t<N;t++){var a=Math.max(0,t-w+1),s=0,c=0;for(var k=a;k<=t;k++){s+=noisy[k];c++;}out.push(s/c);}return out;}
    function draw(){
      var w=+document.getElementById('mv-r').value, sm=ma(w);
      var W=460,H=190,pad=26,lo=45,hi=100,X=function(t){return pad+t/(N-1)*(W-2*pad);},Y=function(v){return H-pad-(v-lo)/(hi-lo)*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      var np='';for(var t=0;t<N;t++){np+=(t?'L':'M')+X(t).toFixed(1)+' '+Y(noisy[t]).toFixed(1)+' ';}
      s+='<path d="'+np+'" fill="none" stroke="#CBD5E1" stroke-width="1.4"/>';
      var sp='';for(var t2=0;t2<N;t2++){sp+=(t2?'L':'M')+X(t2).toFixed(1)+' '+Y(sm[t2]).toFixed(1)+' ';}
      s+='<path d="'+sp+'" fill="none" stroke="#2563EB" stroke-width="2.6"/>';
      s+='</svg>';
      document.getElementById('mv-plot').innerHTML=s;
      document.getElementById('mv-w').textContent=w;
    }
    window.__mv_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="mv-guess">'+
        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, makin lebar makin halus':'Yes, wider is smoother')+'</button>'+
        '<button class="btn" data-v="no">'+(lang==='id'?'Ada harga yang dibayar':'There is a price to pay')+'</button>'+
      '</div>'+
      '<div id="mv-after" style="display:none;margin-top:16px;">'+
        '<div id="mv-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Abu-abu = data asli berisik; biru = rata-rata bergerak.':'Gray = raw noisy data; blue = moving average.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Lebar jendela: ':'Window size: ')+'<b id="mv-w">3</b></label>'+
        '<input type="range" id="mv-r" min="1" max="25" value="3" step="1" oninput="(window.__mv_u&&window.__mv_u())"/>'+
        '<div class="feedback" id="mv-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#mv-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('mv-after').style.display='block';
      document.getElementById('mv-fb').innerHTML=(lang==='id'
        ?'Lebarkan jendela: garis biru memang makin halus, tapi puncaknya bergeser ke kanan (telat/lag) dan makin rendah — detail penting jadi tumpul. Ada trade-off antara meredam derau dan mempertahankan ketajaman sinyal. Jendela sempit responsif tapi berisik; jendela lebar mulus tapi lamban bereaksi terhadap perubahan.'
        :'Widen the window: the blue line gets smoother, but its peak shifts right (lag) and flattens — important detail is dulled. There is a trade-off between suppressing noise and preserving signal sharpness. A narrow window is responsive but noisy; a wide window is smooth but slow to react to change.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Moving average (rata-rata bergerak)', en:'Moving average'}, sub:{id:'penghalusan deret waktu', en:'time-series smoothing'},
    def:{id:'Teknik menghaluskan deret waktu dengan mengganti tiap titik dengan rata-rata dari beberapa titik di sekitarnya (jendela), guna meredam fluktuasi jangka pendek dan menonjolkan tren.', en:'A technique for smoothing a time series by replacing each point with the average of several nearby points (a window), to dampen short-term fluctuations and highlight the trend.'},
    formula:'MAₜ = (1/w) · Σ xₜ₋ᵢ ,  i = 0 … w−1',
    theory:{id:'Merata-rata menjumlahkan kesalahan acak yang sebagian saling meniadakan, sehingga derau berkurang seperti 1/√w. Namun ada ongkosnya: rata-rata bergerak sederhana memberi bobot sama pada masa lalu, sehingga tertinggal di belakang perubahan nyata (lag) dan menumpulkan puncak. Memperlebar jendela menukar lebih sedikit derau dengan lebih banyak keterlambatan dan bias.', en:'Averaging sums random errors that partly cancel, so noise drops like 1/√w. But there is a cost: a simple moving average weights the past equally, so it lags behind real changes and blunts peaks. Widening the window trades less noise for more lag and bias.'},
    practice:{id:'Rata-rata bergerak ada di mana-mana: harga saham (MA 50/200 hari), kasus harian wabah, dan dasbor metrik. Pilih lebar jendela sesuai tujuan: pendek untuk mendeteksi perubahan cepat, panjang untuk melihat tren besar. Varian berbobot seperti exponential moving average memberi bobot lebih pada data terbaru untuk mengurangi lag.', en:'Moving averages are everywhere: stock prices (50/200-day MA), daily epidemic cases, and metric dashboards. Choose the window for your goal: short to catch fast changes, long to see the big trend. Weighted variants like the exponential moving average put more weight on recent data to reduce lag.'}
  }
});

/* ---------- 21. autoregressive ---------- */
addConcept({
  id:'ar', icon:'🔁', color:'#7C3AED',
  cat:{id:'Deret waktu', en:'Time series'},
  title:{id:'Model autoregresif (AR)', en:'Autoregressive (AR) model'},
  tag:{id:'Memprediksi masa depan dari masa lalunya sendiri — dan satu angka (φ) menentukan apakah deret tenang, persisten, atau meledak.', en:'Predicting the future from its own past — and one number (φ) decides whether the series is calm, persistent, or explosive.'},
  hook:{id:'Pada model x(t) = φ · x(t−1) + derau, kalau φ mendekati 1, deretnya akan cenderung…?', en:'In the model x(t) = φ · x(t−1) + noise, when φ approaches 1, the series will tend to…?'},
  build:function(host,lang,reveal){
    var rng=mulberry32(44), eps=[]; for(var i=0;i<120;i++) eps.push(gauss(rng)*4);
    function draw(){
      var phi=+document.getElementById('ar-r').value, x=[0];

        ?'Geser φ. Saat φ kecil (~0) deret mirip derau acak tanpa memori. Saat φ mendekati 1 (~0.8) deret jadi <b>persisten</b>: nilai tinggi diikuti nilai tinggi, bergerak lambat dan halus. Pada φ = 1 ia menjadi <b>random walk</b> (tak stasioner), dan φ > 1 membuatnya <b>meledak</b>. φ negatif membuatnya berosilasi naik-turun.'
        :'Slide φ. When φ is small (~0) the series looks like memoryless random noise. As φ nears 1 (~0.8) it becomes <b>persistent</b>: high values follow high values, moving slowly and smoothly. At φ = 1 it becomes a <b>random walk</b> (non-stationary), and φ > 1 makes it <b>explode</b>. Negative φ makes it oscillate up and down.');
      draw(); reveal();

  concept:{
    name:{id:'Model autoregresif (AR)', en:'Autoregressive (AR) model'}, sub:{id:'Yule & Walker, 1920-an', en:'Yule & Walker, 1920s'},
    def:{id:'Model deret waktu yang memprediksi nilai saat ini sebagai kombinasi linier dari nilai-nilai sebelumnya pada deret yang sama, ditambah suku derau acak.', en:'A time-series model that predicts the current value as a linear combination of the series’ own previous values, plus a random noise term.'},
    formula:'xₜ = c + <span class="v">φ₁</span>xₜ₋₁ + … + <span class="v">φₚ</span>xₜ₋ₚ + εₜ',
    theory:{id:'Koefisien φ mengukur seberapa kuat masa lalu menggema ke masa kini. Untuk AR(1), |φ| < 1 menghasilkan deret stasioner yang kembali ke rata-rata; φ = 1 adalah random walk (tak stasioner, kejutan bertahan selamanya); |φ| > 1 meledak. Inilah jembatan ke stasioneritas: hanya proses dengan akar di dalam lingkaran satuan yang berperilaku stabil dan dapat diramal dengan baik.', en:'The coefficient φ measures how strongly the past echoes into the present. For AR(1), |φ| < 1 gives a stationary, mean-reverting series; φ = 1 is a random walk (non-stationary, shocks persist forever); |φ| > 1 explodes. This is the bridge to stationarity: only processes with roots inside the unit circle behave stably and forecast well.'},

addConcept({
  id:'svm', icon:'🛡️', color:'#9333EA',

  hook:{id:'Dua kelompok titik bisa dipisahkan oleh banyak garis berbeda. Mana garis pemisah yang “terbaik”?', en:'Two groups of points can be separated by many different lines. Which separating line is “best”?'},
  build:function(host,lang,reveal){
    var A=[[2.5,7],[3,8],[3.5,6.6],[2,7.4],[3.3,7.8],[2.7,6.9]], B=[[7,3],[7.6,2.6],[6.6,3.6],[8,3.1],[7.2,2.2],[6.9,3.1]];
    function gap(th){var c=Math.cos(th),s=Math.sin(th);var pa=A.map(function(p){return p[0]*c+p[1]*s;}),pb=B.map(function(p){return p[0]*c+p[1]*s;});var mxA=Math.max.apply(null,pa),mnA=Math.min.apply(null,pa),mxB=Math.max.apply(null,pb),mnB=Math.min.apply(null,pb);var g,mid;if((mxA+mnA)/2<(mxB+mnB)/2){g=mnB-mxA;mid=(mnB+mxA)/2;}else{g=mnA-mxB;mid=(mnA+mxB)/2;}return {g:g,mid:mid,c:c,s:s};}
    function draw(){
      var th=+document.getElementById('sv-r').value*Math.PI/180, info=gap(th), margin=info.g/2;
      var W=440,H=240,pad=28,Xs=function(x){return pad+x/10*(W-2*pad);},Ys=function(y){return H-pad-y/10*(H-2*pad);};

      function seg(off,dash,wd,col){var bx=(info.mid+off)*c,by=(info.mid+off)*sn;var x1=bx-dirx*Lm,y1=by-diry*Lm,x2=bx+dirx*Lm,y2=by+diry*Lm;return '<line x1="'+Xs(x1).toFixed(1)+'" y1="'+Ys(y1).toFixed(1)+'" x2="'+Xs(x2).toFixed(1)+'" y2="'+Ys(y2).toFixed(1)+'" stroke="'+col+'" stroke-width="'+wd+'"'+(dash?' stroke-dasharray="4,3"':'')+'/>';}
      if(info.g>0){ s+=seg(margin,1,1.4,'#C4B5FD')+seg(-margin,1,1.4,'#C4B5FD'); }
      s+=seg(0,0,2.4,info.g>0?'#9333EA':'#EF4444');
      A.forEach(function(p){s+='<circle cx="'+Xs(p[0]).toFixed(1)+'" cy="'+Ys(p[1]).toFixed(1)+'" r="5" fill="#2563EB"/>';});
      B.forEach(function(p){s+='<circle cx="'+Xs(p[0]).toFixed(1)+'" cy="'+Ys(p[1]).toFixed(1)+'" r="5" fill="#16A34A"/>';});
      s+='</svg>';

    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="sv-guess">'+
        '<button class="btn" data-v="near">'+(lang==='id'?'Yang menempel satu kelompok':'The one hugging a group')+'</button>'+
        '<button class="btn" data-v="wide">'+(lang==='id'?'Yang jaraknya paling lebar':'The one with widest gap')+'</button>'+
      '</div>'+
      '<div id="sv-after" style="display:none;margin-top:16px;">'+
        '<div id="sv-plot"></div>'+
        '<p class="readout" style="margin:2px 0;">'+(lang==='id'?'Ungu = garis pemisah; garis putus = batas “lorong” (margin).':'Purple = separating line; dashed = the margin “street”.')+'</p>'+
        '<label class="fld" style="display:block;">'+(lang==='id'?'Sudut garis: ':'Line angle: ')+'<b id="sv-deg">90</b>° · margin = <b id="sv-m" style="color:#9333EA;"></b></label>'+
        '<input type="range" id="sv-r" min="0" max="180" value="90" step="1" oninput="document.getElementById(\'sv-deg\').textContent=this.value;(window.__sv_u&&window.__sv_u())"/>'+
        '<div class="btn-row" style="margin-top:10px;"><button class="btn primary" id="sv-opt">'+(lang==='id'?'Maksimalkan margin':'Maximize the margin')+'</button></div>'+
        '<div class="feedback" id="sv-fb" style="display:block;"></div>'+

      document.getElementById('sv-after').style.display='block';

        ?'Putar sudut garis dan perhatikan lebar “lorong” (margin). Garis terbaik bukan yang asal memisahkan, melainkan yang menyisakan <b>margin terlebar</b> ke titik terdekat kedua kelompok. Margin lebar = paling tahan terhadap titik baru yang sedikit bergeser. Titik-titik tepat di tepi lorong itulah “support vector” yang menentukan garis.'
        :'Rotate the line and watch the “street” width (margin). The best line is not one that merely separates, but the one leaving the <b>widest margin</b> to the nearest points of both groups. A wide margin = most robust to new points that shift slightly. The points right on the edge are the “support vectors” that define the line.');

  concept:{
    name:{id:'Support Vector Machine (SVM)', en:'Support Vector Machine (SVM)'}, sub:{id:'Vapnik & Cortes, 1995', en:'Vapnik & Cortes, 1995'},
    def:{id:'Model klasifikasi yang mencari batas pemisah antar kelas dengan memaksimalkan margin — jarak terlebar ke titik data terdekat dari tiap kelas (support vector).', en:'A classification model that finds the boundary between classes by maximizing the margin — the widest distance to the nearest data points of each class (the support vectors).'},
    formula:'maks margin = 2/‖w‖   s.t.  yᵢ(w·xᵢ + b) ≥ 1',
    theory:{id:'Di antara tak hingga banyak garis pemisah, SVM memilih yang paling “lega” terhadap kedua kelas; secara matematis ini meminimalkan ‖w‖ dengan kendala semua titik berada di sisi benar margin. Margin lebar mengurangi sensitivitas terhadap gangguan kecil, sehingga generalisasi lebih baik. Untuk data yang tidak terpisah linier, “kernel trick” memetakan data ke ruang dimensi lebih tinggi tempat pemisahan linier menjadi mungkin.', en:'Among infinitely many separating lines, SVM picks the one most “roomy” for both classes; mathematically this minimizes ‖w‖ subject to all points lying on the correct side of the margin. A wide margin reduces sensitivity to small perturbations, improving generalization. For data not linearly separable, the “kernel trick” maps it into a higher-dimensional space where linear separation becomes possible.'},
    practice:{id:'SVM kuat pada data berdimensi tinggi dengan sampel terbatas (mis. klasifikasi teks, bioinformatika). Hanya support vector yang menentukan model, membuatnya hemat memori. Kelemahannya: pemilihan kernel dan parameter (C, γ) butuh penyetelan, dan ia kurang skala untuk dataset sangat besar dibanding metode berbasis pohon atau jaringan saraf.', en:'SVM is strong on high-dimensional data with limited samples (e.g. text classification, bioinformatics). Only the support vectors define the model, making it memory-efficient. Drawbacks: kernel and parameter choice (C, γ) need tuning, and it scales poorly to very large datasets compared with tree-based or neural methods.'}
  }
});

    practice:{id:'Bila tidak bisa mengacak, gunakan metode seperti regresi dengan kontrol perancu, matching, difference-in-differences, regression discontinuity, atau variabel instrumen. Kunci keberhasilannya adalah asumsi yang masuk akal tentang struktur sebab — yang harus dipertanggungjawabkan secara eksplisit, bukan disembunyikan. Inferensi kausal yang baik bersikap rendah hati tentang apa yang tidak teramati.', en:'When you cannot randomize, use methods like regression with confounder control, matching, difference-in-differences, regression discontinuity, or instrumental variables. The key to success is plausible assumptions about the causal structure — which must be stated explicitly, not hidden. Good causal inference stays humble about what is unobserved.'}
