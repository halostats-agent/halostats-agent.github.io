<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HaloStats — Statistika untuk semua</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F8FAFC; --surface:#fff; --ink:#0F172A; --muted:#64748B; --faint:#94A3B8;
  --line:#E2E8F0; --blue:#2563EB; --blue-soft:#EFF6FF; --amber:#F59E0B;
  --green:#16A34A; --green-soft:#ECFDF5; --red:#EF4444; --red-soft:#FEF2F2; --violet:#7C3AED;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px 64px;}
a{color:var(--blue);}
button{font-family:inherit;cursor:pointer;}

header.top{position:sticky;top:0;z-index:50;background:rgba(248,250,252,0.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.top-in{max-width:1080px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:12px;}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:19px;letter-spacing:-0.5px;}
.brand .logo{font-size:22px;}
.brand small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0;}
.spacer{flex:1;}
.langtog{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface);}
.langtog button{border:none;background:none;padding:6px 11px;font-size:12px;font-weight:800;color:var(--muted);}
.langtog button.on{background:var(--blue);color:#fff;}
.iconbtn{border:1px solid var(--line);background:var(--surface);border-radius:9px;width:36px;height:34px;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center;}

.hero{padding:30px 0 14px;}
.hero h1{font-size:30px;font-weight:900;letter-spacing:-0.8px;line-height:1.15;}
.hero p{color:var(--muted);font-size:15px;margin-top:8px;max-width:620px;}

.searchbar{display:flex;gap:8px;margin:20px 0 6px;flex-wrap:wrap;}
.searchbar .ipt{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:0 12px;}
.searchbar input{flex:1;border:none;outline:none;background:none;font-size:14px;padding:11px 0;font-family:inherit;color:var(--ink);}
.searchbar .gen{background:var(--ink);color:#fff;border:none;border-radius:11px;padding:0 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
.searchbar .gen:hover{background:#1e293b;}
.hint{font-size:12px;color:var(--faint);margin-bottom:18px;}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 18px;}
.chip{border:1px solid var(--line);background:var(--surface);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--muted);}
.chip.on{background:var(--blue-soft);border-color:#BFDBFE;color:var(--blue);}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:13px;}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;text-align:left;transition:transform .12s,box-shadow .12s,border-color .12s;display:flex;flex-direction:column;gap:7px;min-height:128px;}
.tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(15,23,42,0.07);border-color:#CBD5E1;}
.tile .ico{font-size:24px;}
.tile .cat{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--blue);}
.tile h3{font-size:16px;font-weight:800;letter-spacing:-0.3px;}
.tile p{font-size:12.5px;color:var(--muted);line-height:1.5;}

/* detail */
.back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--muted);font-size:13px;font-weight:700;padding:18px 0 12px;}
.detail-head .cat{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--blue);}
.detail-head h2{font-size:26px;font-weight:900;letter-spacing:-0.6px;line-height:1.2;margin-top:4px;}
.detail-head .tag{color:var(--muted);font-size:15px;margin-top:6px;max-width:640px;}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-top:18px;}
.scn{background:#F1F5F9;border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.scn .q{font-weight:700;font-size:15px;}
.scn .s{color:var(--muted);font-size:13.5px;margin-top:4px;}

.btn{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--ink);}
.btn:hover{background:#F1F5F9;}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn.primary:hover{background:#1d4ed8;}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;}

label.fld{font-size:12.5px;color:var(--muted);font-weight:600;}
input[type=range]{width:100%;accent-color:var(--blue);height:22px;}
.readout{font-size:13px;color:var(--muted);}
.big{font-size:26px;font-weight:800;letter-spacing:-0.5px;}

.feedback{margin-top:14px;font-size:14px;line-height:1.6;background:var(--blue-soft);border:1px solid #BFDBFE;border-radius:11px;padding:13px 15px;color:#1e3a8a;display:none;}

.concept{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);padding:22px;display:none;}
.concept .badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);background:var(--blue-soft);border-radius:7px;padding:4px 10px;margin-bottom:12px;}
.concept h3{font-size:21px;font-weight:900;letter-spacing:-0.4px;}
.concept .sub{color:var(--muted);font-size:13px;margin-top:2px;margin-bottom:16px;}
.concept .sec{margin-top:16px;}
.concept .sec .h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:5px;}
.concept .sec p{font-size:14.5px;line-height:1.7;}
.formula{font-family:'Plus Jakarta Sans',ui-monospace,monospace;background:#0F172A;color:#E2E8F0;border-radius:10px;padding:13px 15px;font-size:13.5px;line-height:1.8;overflow-x:auto;font-weight:500;}
.formula .v{color:#FCD34D;}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:18px;}
.modal{background:var(--surface);border-radius:16px;max-width:430px;width:100%;padding:22px;}
.modal h4{font-size:18px;font-weight:900;margin-bottom:4px;}
.modal p{font-size:13px;color:var(--muted);margin-bottom:14px;}
.modal label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:10px 0 5px;}
.modal input,.modal select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font-size:13px;font-family:inherit;outline:none;}
.modal input:focus{border-color:var(--blue);}

footer{text-align:center;color:var(--faint);font-size:12px;padding:34px 0 0;}
.dotline{font-size:11px;}

@media(max-width:560px){
  .hero h1{font-size:25px;} .detail-head h2{font-size:22px;}
  .panel,.concept{padding:16px;}
}
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="brand"><span class="logo">📊</span><div>HaloStats<small data-i="brandsub"></small></div></div>
    <div class="spacer"></div>
    <div class="langtog">
      <button id="lang-id" class="on" onclick="setLang('id')">ID</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
    </div>
    <button class="iconbtn" title="API key" onclick="openSettings()">⚙️</button>
  </div>
</header>

<div class="wrap">
  <!-- LIST VIEW -->
  <section id="view-list">
    <div class="hero">
      <h1 data-i="heroTitle"></h1>
      <p data-i="heroSub"></p>
    </div>
    <div class="searchbar">
      <div class="ipt">🔎 <input id="q" oninput="onSearch()" data-iph="searchPh"/></div>
      <button class="gen" onclick="generate()">✨ <span data-i="genBtn"></span></button>
    </div>
    <div class="hint" data-i="genHint"></div>
    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- DETAIL VIEW -->
  <section id="view-detail" style="display:none;">
    <button class="back" onclick="goList()">← <span data-i="back"></span></button>
    <div class="detail-head">
      <div class="cat" id="d-cat"></div>
      <h2 id="d-title"></h2>
      <div class="tag" id="d-tag"></div>
    </div>
    <div class="panel" id="d-interactive"></div>
    <div class="concept" id="d-concept"></div>
  </section>

  <footer>
    <div data-i="footer"></div>
    <div class="dotline">halostats-agent.github.io</div>
  </footer>
</div>

<!-- settings modal -->
<div class="modal-bg" id="settings">
  <div class="modal">
    <h4 data-i="setTitle"></h4>
    <p data-i="setDesc"></p>
    <label data-i="setKey"></label>
    <input id="apikey" type="password" placeholder="sk-ant-..."/>
    <label data-i="setModel"></label>
    <input id="model" value="claude-sonnet-4-6"/>
    <div class="btn-row" style="margin-top:16px;justify-content:flex-end;">
      <button class="btn" onclick="closeSettings()" data-i="cancel"></button>
      <button class="btn primary" onclick="saveSettings()" data-i="save"></button>
    </div>
  </div>
</div>

<script>
/* ============================ i18n + state ============================ */
var LANG = localStorage.getItem('hs_lang') || 'id';
var UI = {
  brandsub:{id:' · Statistika untuk semua', en:' · Statistics for everyone'},
  heroTitle:{id:'Pahami statistika lewat intuisi, bukan rumus.', en:'Understand statistics through intuition, not formulas.'},
  heroSub:{id:'Tebak dulu, lihat kejutannya, baru naik level ke teori. Tiap konsep punya satu eksperimen kecil yang bisa kamu mainkan.', en:'Guess first, see the surprise, then level up to the theory. Each concept has one tiny experiment you can play with.'},
  searchPh:{id:'Cari konsep… (mis. regresi, p-value)', en:'Search a concept… (e.g. regression, p-value)'},
  genBtn:{id:'Buat dengan AI', en:'Generate with AI'},
  genHint:{id:'Tidak ketemu? Ketik konsep apa pun lalu klik “Buat dengan AI” (butuh API key Anthropic kamu).', en:'Not here? Type any concept and click “Generate with AI” (needs your Anthropic API key).'},
  back:{id:'Semua konsep', en:'All concepts'},
  footer:{id:'HaloStats — gratis, tanpa iklan, sumber terbuka.', en:'HaloStats — free, no ads, open source.'},
  reveal:{id:'Lihat jawabannya', en:'Reveal the answer'},
  setTitle:{id:'Anthropic API key', en:'Anthropic API key'},
  setDesc:{id:'Disimpan hanya di browser kamu (localStorage), tidak dikirim ke mana pun selain Anthropic.', en:'Stored only in your browser (localStorage), sent nowhere except Anthropic.'},
  setKey:{id:'API key', en:'API key'},
  setModel:{id:'Model', en:'Model'},
  cancel:{id:'Batal', en:'Cancel'}, save:{id:'Simpan', en:'Save'},
  named:{id:'Ternyata ini ada namanya', en:'Turns out this has a name'},
  cDef:{id:'Definisi', en:'Definition'}, cForm:{id:'Formulasi', en:'Formula'},
  cTheory:{id:'Penalaran teoritis', en:'The theory'}, cPractice:{id:'Penalaran praktis', en:'In practice'},
  allcat:{id:'Semua', en:'All'}
};
function t(k){ return (UI[k]||{})[LANG] || ''; }
function L(o){ return o ? (o[LANG]!==undefined ? o[LANG] : o.id) : ''; }

/* ============================ concepts ============================ */
var CONCEPTS = [];
function addConcept(o){ CONCEPTS.push(o); }

/* seeded RNG helpers */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function gauss(rng){var u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

/* ---------- 1. Regression to the mean ---------- */
addConcept({
  id:'rtm', icon:'🎯', color:'#2563EB',
  cat:{id:'Bias & ilusi', en:'Bias & illusion'},
  title:{id:'Regresi ke rata-rata', en:'Regression to the mean'},
  tag:{id:'Kenapa "yang terbaik" hampir selalu menurun, dan "yang terburuk" membaik — tanpa sebab khusus.', en:'Why "the best" almost always declines and "the worst" improves — for no special reason.'},
  hook:{id:'Sebuah klinik memanggil 10 orang dengan kolesterol tertinggi bulan ini untuk program diet. Bulan depan rata-rata mereka turun. Penyebab utamanya?', en:'A clinic enrolls the 10 people with the highest cholesterol this month into a diet program. Next month their average drops. The main cause?'},
  build:function(host,lang,reveal){
    var seed=42;
    function run(){
      var rng=mulberry32(seed);
      var N=40, people=[];
      for(var i=0;i<N;i++){ var base=gauss(rng)*12+200; people.push({base:base,m1:base+gauss(rng)*12,m2:base+gauss(rng)*12}); }
      var idx=people.map(function(p,i){return i;}).sort(function(a,b){return people[b].m1-people[a].m1;}).slice(0,10);
      var avg=function(f){return idx.reduce(function(s,i){return s+f(people[i]);},0)/idx.length;};
      var a1=avg(function(p){return p.m1;}), a2=avg(function(p){return p.m2;});
      var allMean=people.reduce(function(s,p){return s+p.base;},0)/N;
      // plot
      var W=440,H=210,pad=34;
      var vals=[]; people.forEach(function(p){vals.push(p.m1,p.m2);});
      var lo=Math.min.apply(null,vals)-4, hi=Math.max.apply(null,vals)+4;
      var X=function(c){return c===1?pad+40:W-pad-40;};
      var Y=function(v){return H-pad-(v-lo)/(hi-lo)*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      s+='<text x="'+X(1)+'" y="16" text-anchor="middle" font-size="11" font-weight="800" fill="#64748B">'+(lang==='id'?'Bulan ini':'This month')+'</text>';
      s+='<text x="'+X(2)+'" y="16" text-anchor="middle" font-size="11" font-weight="800" fill="#64748B">'+(lang==='id'?'Bulan depan':'Next month')+'</text>';
      var mY=Y(allMean);
      s+='<line x1="'+pad+'" y1="'+mY+'" x2="'+(W-pad)+'" y2="'+mY+'" stroke="#CBD5E1" stroke-dasharray="4,3"/>';
      s+='<text x="'+(W-pad)+'" y="'+(mY-5)+'" text-anchor="end" font-size="10" fill="#94A3B8">'+(lang==='id'?'rata-rata semua':'overall mean')+'</text>';
      people.forEach(function(p,i){ if(idx.indexOf(i)<0){ s+='<circle cx="'+X(1)+'" cy="'+Y(p.m1)+'" r="3" fill="#CBD5E1"/><circle cx="'+X(2)+'" cy="'+Y(p.m2)+'" r="3" fill="#CBD5E1"/>'; }});
      idx.forEach(function(i){ var p=people[i]; s+='<line x1="'+X(1)+'" y1="'+Y(p.m1)+'" x2="'+X(2)+'" y2="'+Y(p.m2)+'" stroke="#F59E0B" stroke-width="1.4" opacity="0.7"/>'; });
      idx.forEach(function(i){ var p=people[i]; s+='<circle cx="'+X(1)+'" cy="'+Y(p.m1)+'" r="4.5" fill="#2563EB"/><circle cx="'+X(2)+'" cy="'+Y(p.m2)+'" r="4.5" fill="#2563EB"/>'; });
      s+='</svg>';
      document.getElementById('rtm-plot').innerHTML=s;
      document.getElementById('rtm-stat').innerHTML=(lang==='id'?'Rata-rata 10 teratas: ':'Top-10 average: ')+'<b>'+a1.toFixed(0)+'</b> → <b style="color:#16A34A">'+a2.toFixed(0)+'</b> '+(lang==='id'?'(turun '+(a1-a2).toFixed(0)+', padahal tidak ada pengobatan apa pun)':'(down '+(a1-a2).toFixed(0)+', with no treatment at all)');
    }
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="rtm-guess">'+
        '<button class="btn" data-v="diet">'+(lang==='id'?'Programnya berhasil':'The program worked')+'</button>'+
        '<button class="btn" data-v="reg">'+(lang==='id'?'Kebanyakan cuma kebetulan':'Mostly just chance')+'</button>'+
      '</div>'+
      '<div id="rtm-after" style="display:none;margin-top:16px;">'+
        '<div id="rtm-plot"></div>'+
        '<p class="readout" id="rtm-stat" style="margin-top:8px;"></p>'+
        '<div class="btn-row" style="margin-top:12px;"><button class="btn" id="rtm-again">'+(lang==='id'?'🎲 Acak ulang':'🎲 Reshuffle')+'</button></div>'+
        '<div class="feedback" id="rtm-fb" style="display:block;"></div>'+
      '</div>';
    var self=this;
    host.querySelectorAll('#rtm-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('rtm-after').style.display='block';
      var fb=document.getElementById('rtm-fb');
      fb.innerHTML=(b.dataset.v==='reg')
        ? (lang==='id'?'<b>Tepat.</b> Mereka dipilih justru karena kebetulan lagi ekstrem tinggi. Diukur lagi, keberuntungan buruk itu sebagian besar hilang — angka mereka <i>regresi</i> mendekati rata-rata, bahkan tanpa intervensi.':'<b>Right.</b> They were picked precisely because they were extreme by chance. Measured again, that bad luck mostly disappears — their numbers <i>regress</i> toward the mean, even with no intervention.')
        : (lang==='id'?'<b>Jebakan klasik.</b> Programnya mungkin sedikit membantu, tapi penurunan terjadi <i>walau tanpa pengobatan</i>. Karena mereka dipilih saat ekstrem tinggi (sebagian karena kebetulan), pengukuran berikutnya pasti turun. Ini regresi ke rata-rata, bukan bukti program berhasil.':'<b>Classic trap.</b> The program may help a little, but the drop happens <i>even without treatment</i>. Because they were selected at an extreme high (partly by luck), the next measurement is bound to fall. That is regression to the mean, not proof the program worked.');
      run(); reveal();
    };});
    setTimeout(function(){ var ag=document.getElementById('rtm-again'); if(ag) ag.onclick=function(){seed=Math.floor(Math.random()*1e6);run();}; },0);
  },
  concept:{
    name:{id:'Regresi ke rata-rata', en:'Regression to the mean'},
    sub:{id:'Sir Francis Galton, 1886', en:'Sir Francis Galton, 1886'},
    def:{id:'Bila sebuah pengukuran ekstrem (sangat tinggi/rendah) sebagian dipengaruhi kebetulan, maka pengukuran berikutnya cenderung lebih dekat ke nilai rata-rata.', en:'When an extreme measurement (very high/low) is partly driven by chance, the next measurement tends to land closer to the average.'},
    formula:'E[X₂ | X₁] = μ + <span class="v">ρ</span>·(X₁ − μ),   0 ≤ <span class="v">ρ</span> < 1',
    theory:{id:'Setiap nilai amatan = sinyal sejati + derau acak. Saat kamu menyaring nilai paling ekstrem, kamu otomatis memilih kasus dengan derau yang kebetulan searah ekstrem. Karena derau tidak berkorelasi antar waktu, pada pengukuran kedua derau itu rata-rata kembali nol, sehingga nilai bergeser menuju mean sebesar (1−ρ) dari simpangannya. Semakin lemah korelasi ρ antar pengukuran, semakin kuat regresinya.', en:'Every observation = true signal + random noise. When you filter for the most extreme values, you automatically select cases whose noise happened to point in the extreme direction. Because noise is uncorrelated across time, on the second measurement it averages back to zero, so values shift toward the mean by (1−ρ) of their deviation. The weaker the correlation ρ, the stronger the regression.'},
    practice:{id:'Hati-hati menilai sebab-akibat dari kelompok yang dipilih karena ekstrem: pasien terparah yang "membaik", sekolah terburuk yang "naik" setelah intervensi, atau pemain rookie hebat yang "kena kutukan musim kedua". Sebagian besar perubahan itu bisa murni regresi. Pelajaran praktisnya: gunakan kelompok kontrol acak, jangan menyimpulkan dari before–after pada kelompok ekstrem saja.', en:'Be careful inferring causation from groups chosen for being extreme: the sickest patients who "improve", the worst schools that "rise" after an intervention, or the star rookie hit by a "sophomore slump". Much of that change can be pure regression. Practical lesson: use a randomized control group; never conclude from before–after on an extreme group alone.'}
  }
});

/* ---------- 2. Simpson's paradox ---------- */
addConcept({
  id:'simpson', icon:'🔀', color:'#7C3AED',
  cat:{id:'Bias & ilusi', en:'Bias & illusion'},
  title:{id:'Paradoks Simpson', en:"Simpson's paradox"},
  tag:{id:'Sebuah tren bisa muncul di tiap kelompok, lalu berbalik arah saat semua kelompok digabung.', en:'A trend can appear in every subgroup, then reverse when all groups are combined.'},
  hook:{id:'Obat A vs Obat B untuk batu ginjal. Pada batu kecil, A lebih sukses. Pada batu besar, A juga lebih sukses. A menang di kedua kelompok — berarti secara total A pasti menang juga?', en:'Drug A vs Drug B for kidney stones. On small stones, A wins. On large stones, A wins too. A wins in both groups — so overall A must win as well?'},
  build:function(host,lang,reveal){
    var data={
      A:{small:{s:81,n:87}, large:{s:192,n:263}},
      B:{small:{s:234,n:270}, large:{s:55,n:80}}
    };
    var pct=function(o){return (o.s/o.n*100);};
    var mode='split';
    function bar(label,val,col){ return '<div style="margin:7px 0;"><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;"><span>'+label+'</span><span style="color:'+col+'">'+val.toFixed(0)+'%</span></div><div style="background:#F1F5F9;border-radius:6px;height:12px;margin-top:3px;"><div style="width:'+val+'%;height:12px;border-radius:6px;background:'+col+'"></div></div></div>'; }
    function render(){
      var h='';
      if(mode==='split'){

    formula:'a/b &lt; c/d  <span class="v">dan</span>  e/f &lt; g/h<br>tetapi  (a+e)/(b+f) &gt; (c+g)/(d+h)',
    theory:{id:'Paradoks ini muncul karena ada variabel perancu (di contoh: ukuran batu) yang berkorelasi sekaligus dengan kelompok dan dengan hasil, serta tersebar tidak seimbang antar kelompok. Saat digabung, rata-rata gabungan menjadi rata-rata berbobot yang didominasi oleh subkelompok berukuran besar. Bobot yang timpang inilah yang bisa membalik kesimpulan. Secara aljabar, perbandingan pecahan tidak "menjumlah" — (a/b dan e/f) tidak menentukan (a+e)/(b+f).', en:'The paradox arises from a confounding variable (here: stone size) that correlates with both the group and the outcome, and is unevenly distributed across groups. When merged, the combined rate becomes a weighted average dominated by the larger subgroup. This skewed weighting can flip the conclusion. Algebraically, ratios do not "add" — (a/b and e/f) do not determine (a+e)/(b+f).'},
    practice:{id:'Selalu tanyakan: "apakah ini agregat yang menyembunyikan kelompok?" Paradoks Simpson sering muncul di evaluasi kebijakan, perbandingan rumah sakit, gaji per gender, atau metrik produk. Solusinya bukan memilih "versi gabung" atau "versi pisah" secara membabi buta, melainkan memahami variabel perancu mana yang relevan secara kausal, lalu menstratifikasi (memisah) berdasarkan variabel itu.', en:'Always ask: "is this an aggregate hiding subgroups?" Simpson\'s paradox shows up in policy evaluation, hospital comparisons, gender pay gaps, and product metrics. The fix is not to blindly pick the "combined" or "split" version, but to understand which confounder is causally relevant, then stratify (split) by it.'}

/* ---------- 3. Law of large numbers ---------- */
addConcept({
  id:'lln', icon:'🪙', color:'#16A34A',
  cat:{id:'Probabilitas', en:'Probability'},
  title:{id:'Hukum bilangan besar', en:'Law of large numbers'},
  tag:{id:'Makin banyak percobaan, rata-ratanya makin stabil mendekati nilai sejati — tapi ada kejutan soal selisihnya.', en:'More trials make the average settle near the true value — but there is a twist about the gap.'},
  hook:{id:'Koin adil dilempar makin banyak kali. Geser jumlah lemparan dan amati dua angka: proporsi angka (mendekati 50%?) dan selisih jumlah |angka − gambar|. Apa yang terjadi pada selisih itu saat lemparan makin banyak?', en:'A fair coin is flipped more and more. Slide the number of flips and watch two numbers: the proportion of heads (near 50%?) and the count gap |heads − tails|. What happens to that gap as flips grow?'},
  build:function(host,lang,reveal){
    var seed=7, MAXP=14; // 2^14 = 16384
    var flips=[]; function regen(){ var rng=mulberry32(seed); flips=[]; for(var i=0;i<16384;i++) flips.push(rng()<0.5?1:0); }
    regen();
    function compute(n){ var h=0; for(var i=0;i<n;i++) h+=flips[i]; return {h:h,t:n-h,prop:h/n,diff:Math.abs(2*h-n)}; }
    function draw(n){
      var W=460,H=200,pad=30;
      var pts=[]; var step=Math.max(1,Math.floor(n/240)); var h=0;
      for(var i=0;i<n;i++){ h+=flips[i]; if(i%step===0||i===n-1){ pts.push([i+1,h/(i+1)]); } }
      var X=function(i){return pad+ (Math.log(i)/Math.log(n))*(W-2*pad);};
      var Y=function(p){return pad+(1-p)*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      var y50=Y(0.5);
      s+='<line x1="'+pad+'" y1="'+y50+'" x2="'+(W-pad)+'" y2="'+y50+'" stroke="#CBD5E1" stroke-dasharray="4,3"/>';
      s+='<text x="'+(W-pad)+'" y="'+(y50-5)+'" text-anchor="end" font-size="10" fill="#94A3B8">0.5</text>';
      var d=''; pts.forEach(function(p,i){ d+=(i?'L':'M')+X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)+' '; });
      s+='<path d="'+d+'" fill="none" stroke="#16A34A" stroke-width="2"/>';
      s+='<text x="'+pad+'" y="'+(H-8)+'" font-size="10" fill="#94A3B8">1</text>';
      s+='<text x="'+(W-pad)+'" y="'+(H-8)+'" text-anchor="end" font-size="10" fill="#94A3B8">'+n+' '+(lang==='id'?'lemparan':'flips')+'</text>';
      s+='</svg>';
      return s;
    }
    function update(){
      var n=Math.round(Math.pow(2,+document.getElementById('lln-r').value));
      var c=compute(n);
      document.getElementById('lln-n').textContent=n.toLocaleString();
      document.getElementById('lln-plot').innerHTML=draw(n);
      document.getElementById('lln-prop').textContent=(c.prop*100).toFixed(1)+'%';
      document.getElementById('lln-diff').textContent=c.diff.toLocaleString();
    }
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="lln-guess">'+
        '<button class="btn" data-v="shrink">'+(lang==='id'?'Selisih makin kecil':'The gap shrinks')+'</button>'+
        '<button class="btn" data-v="grow">'+(lang==='id'?'Selisih makin besar':'The gap grows')+'</button>'+
      '</div>'+
      '<div id="lln-after" style="display:none;margin-top:16px;">'+
        '<label class="fld">'+(lang==='id'?'Jumlah lemparan: ':'Number of flips: ')+'<b id="lln-n">256</b></label>'+
        '<input type="range" id="lln-r" min="3" max="'+MAXP+'" value="8" step="0.05" oninput="(window.__lln_u&&window.__lln_u())"/>'+
        '<div id="lln-plot" style="margin-top:6px;"></div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:12px;"><div class="readout">'+(lang==='id'?'Proporsi angka':'Proportion of heads')+'</div><div class="big" id="lln-prop" style="color:#16A34A">50%</div></div>'+
          '<div style="background:#FEF2F2;border-radius:10px;padding:12px;"><div class="readout">'+(lang==='id'?'Selisih |angka − gambar|':'Gap |heads − tails|')+'</div><div class="big" id="lln-diff" style="color:#EF4444">0</div></div>'+
        '</div>'+
        '<div class="feedback" id="lln-fb" style="display:block;"></div>'+
      '</div>';
    window.__lln_u=update;
    host.querySelectorAll('#lln-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('lln-after').style.display='block';
      var fb=document.getElementById('lln-fb');
      fb.innerHTML=(b.dataset.v==='grow')
        ?(lang==='id'?'<b>Tajam!</b> Ini bagian yang sering disalahpahami. <b>Proporsi</b> memang menyatu ke 50% (itulah hukum bilangan besar), tapi <b>selisih jumlah absolut</b> justru cenderung membesar (tumbuh ~√n). Stabil dalam rasio, tidak stabil dalam selisih.':'<b>Sharp!</b> This is the commonly misunderstood part. The <b>proportion</b> does converge to 50% (that is the law of large numbers), but the <b>absolute count gap</b> tends to grow (~√n). Stable in ratio, not in difference.')
        :(lang==='id'?'<b>Intuisi umum, tapi keliru.</b> Geser ke kanan: proporsi memang mendekati 50%, tapi angka selisih merah malah naik. Yang menyatu adalah <i>rasio</i>, bukan selisih absolut.':'<b>Common intuition, but wrong.</b> Slide right: the proportion approaches 50%, yet the red gap number rises. What converges is the <i>ratio</i>, not the absolute difference.');
      update(); reveal();

  },
  concept:{
    name:{id:'Hukum bilangan besar', en:'Law of large numbers'},
    sub:{id:'Jacob Bernoulli, 1713', en:'Jacob Bernoulli, 1713'},
    def:{id:'Seiring jumlah percobaan independen bertambah, rata-rata sampel akan konvergen menuju nilai harapan (rata-rata sejati) populasi.', en:'As the number of independent trials grows, the sample average converges toward the expected value (the true population mean).'},
    formula:'X̄ₙ = (1/n) Σ Xᵢ  →  <span class="v">μ</span>   (n → ∞)<br>Var(X̄ₙ) = σ² / n  →  0',
    theory:{id:'Karena ragam rata-rata sampel adalah σ²/n, ia menyusut ke nol saat n membesar — itu sebabnya proporsi "mengunci" di nilai sejati. Namun ini soal rata-rata, bukan jumlah. Simpangan baku dari jumlah total tumbuh seperti √n, sehingga selisih absolut dari nilai harapan justru cenderung membesar walau proporsinya menyatu. Hukum ini juga tidak punya "memori": koin tidak "wajib" menyeimbangkan diri (itu kekeliruan penjudi).', en:'Because the variance of the sample mean is σ²/n, it shrinks to zero as n grows — which is why the proportion "locks in" on the true value. But this is about the average, not the sum. The standard deviation of the total grows like √n, so the absolute deviation from expectation tends to grow even as the proportion converges. The law also has no "memory": a coin is not "due" to balance out (that is the gambler\'s fallacy).'},
    practice:{id:'Hukum bilangan besar adalah fondasi asuransi, kasino, dan survei: dengan banyak kasus, rata-rata jadi dapat diprediksi meski tiap kasus acak. Tapi hati-hati pada dua jebakan: (1) sampel kecil tidak menikmati jaminan ini — hasilnya bisa liar; (2) konvergensi proporsi bukan berarti "akan ada koreksi" pada hasil individual. Banyak penipuan dan kekeliruan judi lahir dari mencampur kedua hal ini.', en:'The law of large numbers underpins insurance, casinos, and polling: with many cases, averages become predictable even though each case is random. But beware two traps: (1) small samples get no such guarantee — results can be wild; (2) convergence of the proportion does not mean a "correction is coming" for individual outcomes. Many scams and gambling fallacies come from conflating these two.'}
  }
});

/* extra stat helpers */
function nCk(n,k){var r=1;for(var i=0;i<k;i++){r=r*(n-i)/(i+1);}return r;}
function binomPmf(n,k,p){return nCk(n,k)*Math.pow(p,k)*Math.pow(1-p,n-k);}
function erf(x){var s=x<0?-1:1;x=Math.abs(x);var t=1/(1+0.3275911*x);var y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return s*y;}
function normCdf(x){return 0.5*(1+erf(x/Math.SQRT2));}
function invNorm(p){var a=[-3.969683028665376e1,2.209460984245205e2,-2.759285104469687e2,1.383577518672690e2,-3.066479806614716e1,2.506628277459239],b=[-5.447609879822406e1,1.615858368580409e2,-1.556989798598866e2,6.680131188771972e1,-1.328068155288572e1],c=[-7.784894002430293e-3,-3.223964580411365e-1,-2.400758277161838,-2.549732539343734,4.374664141464968,2.938163982698783],d=[7.784695709041462e-3,3.224671290700398e-1,2.445134137142996,3.754408661907416],pl=0.02425,ph=1-pl,q,r;if(p<pl){q=Math.sqrt(-2*Math.log(p));return(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}if(p<=ph){q=p-0.5;r=q*q;return(((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}q=Math.sqrt(-2*Math.log(1-p));return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}

/* ---------- 4. p-value ---------- */
addConcept({
  id:'pval', icon:'🎲', color:'#2563EB',
  cat:{id:'Inferensi', en:'Inference'},
  title:{id:'p-value', en:'p-value'},
  tag:{id:'Seberapa mengejutkan data ini seandainya tidak ada efek apa-apa? Bukan peluang kamu benar.', en:'How surprising is this data if there were no effect at all? Not the probability you are right.'},
  hook:{id:'Sebuah koin dilempar 20 kali dan muncul 15 angka. Curang, atau masih wajar untuk koin adil?', en:'A coin is flipped 20 times and lands 15 heads. Rigged, or still plausible for a fair coin?'},
  build:function(host,lang,reveal){
    function pmf(k){return binomPmf(20,k,0.5);}
    function pTwo(obs){var o=Math.min(obs,20-obs),s=0;for(var k=0;k<=20;k++){if(Math.min(k,20-k)<=o)s+=pmf(k);}return Math.min(1,s);}

        '<div id="pv-plot"></div>'+
        '<label class="fld" style="margin-top:8px;display:block;">'+(lang==='id'?'Jumlah angka teramati: ':'Heads observed: ')+'<b id="pv-obs">15</b> / 20</label>'+
        '<input type="range" id="pv-r" min="10" max="20" value="15" step="1" oninput="(window.__pv_u&&window.__pv_u())"/>'+

    host.querySelectorAll('#pv-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('pv-after').style.display='block';

        ?'15/20 memberi <b>p ≈ 0.041</b> — tepat di ambang, “signifikan” tapi tipis, bukan bukti telak seperti dugaan kebanyakan orang. Geser slider: 13/20 (p ≈ 0.26) sangat wajar, sementara 17/20 baru benar-benar mengejutkan. Ambang 0.05 itu konvensi, bukan garis ajaib.'
        :'15/20 gives <b>p ≈ 0.041</b> — right at the threshold, “significant” but thin, not the slam-dunk most people assume. Slide it: 13/20 (p ≈ 0.26) is very normal, while 17/20 is genuinely surprising. The 0.05 cutoff is a convention, not a magic line.');
      update(); reveal();

  },
  concept:{
    name:{id:'p-value', en:'p-value'}, sub:{id:'Ronald Fisher, 1925', en:'Ronald Fisher, 1925'},
    def:{id:'Peluang memperoleh data seekstrem ini (atau lebih) seandainya hipotesis nol (tidak ada efek) benar. Semakin kecil p, semakin mengejutkan data itu di bawah asumsi “tidak ada efek”.', en:'The probability of obtaining data this extreme (or more) if the null hypothesis (no effect) were true. The smaller the p, the more surprising the data is under the “no effect” assumption.'},
    formula:'p = P( data ≥ seekstrem ini | <span class="v">H₀</span> benar )',
    theory:{id:'p-value bukan peluang bahwa hipotesismu benar, dan bukan ukuran besarnya efek. Ia hanya mengukur kecocokan data dengan model “tidak ada efek”. Ambang 0,05 adalah konvensi arbitrer dari Fisher, bukan hukum alam. p besar bukan bukti H₀ benar — hanya berarti data belum cukup menentangnya.', en:'A p-value is not the probability that your hypothesis is true, nor a measure of effect size. It only measures how compatible the data are with the “no effect” model. The 0.05 threshold is an arbitrary convention from Fisher, not a law of nature. A large p is not evidence that H₀ is true — it just means the data do not contradict it strongly enough.'},
    practice:{id:'Bahaya terbesar adalah p-hacking: mencoba banyak uji lalu melaporkan yang kebetulan p < 0,05. Dengan sampel sangat besar, efek yang remeh pun bisa “signifikan” secara statistik tapi tak berarti secara praktis. Selalu laporkan ukuran efek dan selang kepercayaan, bukan hanya p, dan tetapkan hipotesis sebelum melihat data.', en:'The biggest danger is p-hacking: running many tests and reporting whichever happens to hit p < 0.05. With a very large sample, even a trivial effect can be “statistically significant” yet meaningless in practice. Always report the effect size and confidence interval, not just p, and fix your hypothesis before looking at the data.'}
  }
});

/* ---------- 5. confidence interval ---------- */
addConcept({
  id:'ci', icon:'📏', color:'#0EA5E9',
  cat:{id:'Inferensi', en:'Inference'},
  title:{id:'Selang kepercayaan', en:'Confidence interval'},
  tag:{id:'“95% yakin” bukan berarti 95% peluang nilai sejati ada di selang ini. Maknanya lebih halus.', en:'“95% confident” does not mean a 95% chance the true value is in this interval. The meaning is subtler.'},
  hook:{id:'Rata-rata sejati populasi = 50 (kita yang atur). Kalau kita buat 20 selang kepercayaan 95% dari 20 sampel berbeda, kira-kira berapa yang memuat angka 50?', en:'The true population mean is 50 (we set it). If we build 20 different 95% confidence intervals from 20 samples, roughly how many will contain 50?'},
  build:function(host,lang,reveal){
    var TRUE=50, se0=10/Math.sqrt(30), seed=11, samples=[];
    function gen(){var rng=mulberry32(seed);samples=[];for(var i=0;i<20;i++){samples.push(TRUE+gauss(rng)*se0);}}
    gen();
    function draw(){
      var conf=+document.getElementById('ci-r').value, z=invNorm(1-(1-conf/100)/2);
      var W=460,H=250,padL=20,padR=20,padT=18,padB=20,lo=TRUE-7,hi=TRUE+7;
      var X=function(v){return padL+(v-lo)/(hi-lo)*(W-padL-padR);};
      var rowH=(H-padT-padB)/20, cover=0;
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      s+='<line x1="'+X(TRUE)+'" y1="'+padT+'" x2="'+X(TRUE)+'" y2="'+(H-padB)+'" stroke="#0F172A" stroke-width="1.5" stroke-dasharray="3,3"/>';
      s+='<text x="'+X(TRUE)+'" y="14" text-anchor="middle" font-size="10" font-weight="800" fill="#0F172A">μ = 50</text>';
      samples.forEach(function(m,i){var a=m-z*se0,b=m+z*se0,y=padT+i*rowH+rowH/2,ok=(a<=TRUE&&TRUE<=b);if(ok)cover++;var col=ok?'#16A34A':'#EF4444';
        s+='<line x1="'+X(a).toFixed(1)+'" y1="'+y.toFixed(1)+'" x2="'+X(b).toFixed(1)+'" y2="'+y.toFixed(1)+'" stroke="'+col+'" stroke-width="2.4"/>';
        s+='<circle cx="'+X(m).toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2.6" fill="'+col+'"/>';});
      s+='</svg>';
      document.getElementById('ci-plot').innerHTML=s;
      document.getElementById('ci-cov').innerHTML='<b style="color:#16A34A">'+cover+'</b> / 20 '+(lang==='id'?'memuat μ — target ':'contain μ — target ')+conf+'%';
      document.getElementById('ci-conf').textContent=conf+'%';
    }
    window.__ci_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="ci-guess">'+
        '<button class="btn" data-v="20">'+(lang==='id'?'Semua (20)':'All (20)')+'</button>'+
        '<button class="btn" data-v="19">'+(lang==='id'?'Sekitar 19':'About 19')+'</button>'+
        '<button class="btn" data-v="10">'+(lang==='id'?'Sekitar 10':'About 10')+'</button>'+
      '</div>'+
      '<div id="ci-after" style="display:none;margin-top:16px;">'+
        '<div id="ci-plot"></div>'+
        '<p class="big" id="ci-cov" style="font-size:18px;margin-top:6px;"></p>'+
        '<label class="fld" style="margin-top:10px;display:block;">'+(lang==='id'?'Tingkat kepercayaan: ':'Confidence level: ')+'<b id="ci-conf">95%</b></label>'+
        '<input type="range" id="ci-r" min="80" max="99" value="95" step="1" oninput="(window.__ci_u&&window.__ci_u())"/>'+
        '<div class="btn-row" style="margin-top:10px;"><button class="btn" id="ci-new">'+(lang==='id'?'🎲 Ambil 20 sampel baru':'🎲 Draw 20 new samples')+'</button></div>'+
        '<div class="feedback" id="ci-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#ci-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('ci-after').style.display='block';
      document.getElementById('ci-fb').innerHTML=(lang==='id'
        ?'Biasanya <b>sekitar 19 dari 20</b> memuat μ. Itulah arti “95%”: bukan peluang nilai sejati ada di <i>satu</i> selang tertentu, melainkan bahwa <b>prosedurnya</b> menangkap nilai sejati pada ~95% pengulangan jangka panjang. Turunkan tingkat kepercayaan: selang menyempit tapi makin sering meleset.'
        :'Usually <b>about 19 of 20</b> contain μ. That is what “95%” means: not the chance the true value lies in <i>one</i> particular interval, but that the <b>procedure</b> captures the true value in ~95% of long-run repeats. Lower the confidence level: intervals get narrower but miss more often.');
      draw(); reveal();
    };});
    setTimeout(function(){var nb=document.getElementById('ci-new');if(nb)nb.onclick=function(){seed=Math.floor(Math.random()*1e6);gen();draw();};},0);
  },
  concept:{
    name:{id:'Selang kepercayaan', en:'Confidence interval'}, sub:{id:'Jerzy Neyman, 1937', en:'Jerzy Neyman, 1937'},
    def:{id:'Rentang nilai yang dihasilkan oleh sebuah prosedur yang, jika diulang berkali-kali, akan memuat parameter sejati sebesar persentase kepercayaan yang ditetapkan (mis. 95%).', en:'A range produced by a procedure that, if repeated many times, would contain the true parameter for the stated confidence percentage (e.g. 95%).'},
    formula:'CI = x̄ ± <span class="v">z*</span> · (σ / √n)',
    theory:{id:'Kepercayaan melekat pada prosedur, bukan pada satu selang tertentu. Setelah selang dihitung, nilai sejati entah ada di dalamnya atau tidak — tidak ada lagi peluang “95%” untuk selang itu sendiri. Lebar selang dikendalikan oleh tiga hal: keragaman data (σ), ukuran sampel (n), dan tingkat kepercayaan (z*). Memperbesar kepercayaan memperlebar selang; memperbesar n mempersempitnya.', en:'The confidence attaches to the procedure, not to a single interval. Once an interval is computed, the true value either is inside it or is not — there is no longer a “95% chance” for that interval itself. The width is driven by three things: data spread (σ), sample size (n), and confidence level (z*). Raising confidence widens the interval; raising n narrows it.'},
    practice:{id:'Selang kepercayaan jauh lebih informatif daripada sekadar “signifikan/tidak”, karena menunjukkan besar efek sekaligus ketidakpastiannya. Selang yang sangat lebar menandakan data belum cukup; selang sempit yang jauh dari nol menandakan bukti kuat. Hati-hati menafsirkan tumpang-tindih dua selang sebagai “tidak berbeda” — itu uji yang berbeda.', en:'A confidence interval is far more informative than a bare “significant or not”, because it shows both the effect size and its uncertainty. A very wide interval signals insufficient data; a narrow interval far from zero signals strong evidence. Be careful reading overlap between two intervals as “no difference” — that is a different test.'}
  }
});

/* ---------- 6. A/B test ---------- */
addConcept({
  id:'abtest', icon:'🧪', color:'#7C3AED',
  cat:{id:'Eksperimen', en:'Experiments'},
  title:{id:'A/B Test', en:'A/B test'},
  tag:{id:'Versi B unggul 12% vs 10% — tapi “lebih tinggi” belum tentu “beneran beda”. Tergantung jumlah data.', en:'Variant B leads 12% vs 10% — but “higher” is not yet “really different”. It depends on how much data you have.'},
  hook:{id:'Versi B konversi 12%, versi A 10%, masing-masing dari 100 pengunjung. Sudah cukup bukti untuk menyatakan B lebih baik?', en:'Variant B converts at 12%, variant A at 10%, each from 100 visitors. Is that enough evidence to call B better?'},
  build:function(host,lang,reveal){
    var pA=0.10,pB=0.12;
    function update(){
      var n=Math.round(Math.pow(10,+document.getElementById('ab-r').value));
      document.getElementById('ab-n').textContent=n.toLocaleString();
      var pp=(pA+pB)/2, se=Math.sqrt(pp*(1-pp)*(2/n)), z=(pB-pA)/se, p=2*(1-normCdf(Math.abs(z)));
      document.getElementById('ab-ca').textContent=Math.round(pA*n).toLocaleString()+' / '+n.toLocaleString();
      document.getElementById('ab-cb').textContent=Math.round(pB*n).toLocaleString()+' / '+n.toLocaleString();
      document.getElementById('ab-z').textContent=z.toFixed(2);

      var sig=p<0.05, v=document.getElementById('ab-verd');
      v.textContent=sig?(lang==='id'?'Signifikan — selisihnya kemungkinan nyata':'Significant — the gap is likely real'):(lang==='id'?'Belum signifikan — bisa jadi cuma kebetulan':'Not significant — could just be noise');
      v.style.color=sig?'#16A34A':'#EF4444';
    }
    window.__ab_u=update;
    var barRow=function(label,col){return '<div style="margin:6px 0;"><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;"><span>'+label+'</span><span style="color:'+col+'">'+(label==='A'?'10%':'12%')+'</span></div><div style="background:#F1F5F9;border-radius:6px;height:12px;margin-top:3px;"><div style="width:'+(label==='A'?60:72)+'%;height:12px;border-radius:6px;background:'+col+'"></div></div></div>';};
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="ab-guess">'+
        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, ganti ke B':'Yes, switch to B')+'</button>'+
        '<button class="btn" data-v="no">'+(lang==='id'?'Belum cukup':'Not enough')+'</button>'+
      '</div>'+
      '<div id="ab-after" style="display:none;margin-top:16px;">'+
        barRow('A','#2563EB')+barRow('B','#7C3AED')+
        '<div style="display:flex;justify-content:space-between;font-size:12px;color:#64748B;margin-top:2px;"><span>A: <b id="ab-ca"></b></span><span>B: <b id="ab-cb"></b></span></div>'+
        '<label class="fld" style="margin-top:12px;display:block;">'+(lang==='id'?'Pengunjung per versi: ':'Visitors per variant: ')+'<b id="ab-n">100</b></label>'+
        '<input type="range" id="ab-r" min="1.7" max="4.7" value="2" step="0.01" oninput="(window.__ab_u&&window.__ab_u())"/>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#F1F5F9;border-radius:10px;padding:11px;"><div class="readout">skor-z</div><div class="big" id="ab-z" style="font-size:22px;">0.45</div></div>'+
          '<div style="background:#F1F5F9;border-radius:10px;padding:11px;"><div class="readout">p-value</div><div class="big" id="ab-p" style="font-size:22px;">0.651</div></div>'+
        '</div>'+
        '<div style="font-weight:800;font-size:14px;margin-top:8px;" id="ab-verd"></div>'+
        '<div class="feedback" id="ab-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#ab-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('ab-after').style.display='block';
      document.getElementById('ab-fb').innerHTML=(lang==='id'
        ?'Dengan 100 pengunjung, <b>p ≈ 0.65</b> — selisih 12% vs 10% sangat mungkin hanya kebetulan. Geser ke kanan: selisih yang <i>sama persis</i> baru jadi signifikan di sekitar ~3.800 pengunjung per versi. Pelajarannya: angka konversi yang lebih tinggi tidak ada artinya tanpa cukup sampel.'
        :'With 100 visitors, <b>p ≈ 0.65</b> — a 12% vs 10% gap could easily be chance. Slide right: the <i>exact same</i> gap only becomes significant at around ~3,800 visitors per variant. The lesson: a higher conversion number means nothing without enough sample.');
      update(); reveal();
    };});
  },
  concept:{
    name:{id:'A/B test (uji dua proporsi)', en:'A/B test (two-proportion test)'}, sub:{id:'Akar dari eksperimen acak Fisher', en:'Rooted in Fisher’s randomized experiments'},
    def:{id:'Eksperimen terkontrol yang membandingkan dua versi (A dan B) dengan membagi pengguna secara acak, lalu menguji apakah perbedaan hasilnya lebih besar daripada yang bisa muncul karena kebetulan.', en:'A controlled experiment comparing two versions (A and B) by randomly splitting users, then testing whether the difference in outcomes is larger than chance could produce.'},
    formula:'z = (p̂_B − p̂_A) / √( <span class="v">p̂</span>(1−<span class="v">p̂</span>)(1/n_A + 1/n_B) )',
    theory:{id:'Pengacakan memastikan kedua kelompok rata-rata setara, sehingga perbedaan hasil bisa dikaitkan ke perlakuan, bukan ke perancu. Ketidakpastian estimasi menyusut seperti 1/√n, jadi makin besar sampel makin kecil selisih yang bisa dideteksi. Skor-z mengubah selisih menjadi “berapa simpangan baku jauhnya dari nol”, lalu p-value menerjemahkannya jadi peluang kebetulan.', en:'Randomization makes the two groups equivalent on average, so any outcome difference can be attributed to the treatment rather than a confounder. Estimation uncertainty shrinks like 1/√n, so larger samples can detect smaller differences. The z-score converts the gap into “how many standard deviations from zero”, then the p-value translates that into a chance probability.'},
    practice:{id:'Tetapkan ukuran sampel lewat power analysis sebelum mulai, dan jangan “mengintip” lalu berhenti begitu p < 0,05 (peeking menggelembungkan positif palsu). Waspadai efek kebaruan (lonjakan sementara karena hal baru), musiman, dan menjalankan terlalu banyak varian sekaligus. Signifikan secara statistik belum tentu berarti besar secara bisnis — selalu lihat ukuran efeknya.', en:'Fix the sample size via power analysis before starting, and do not “peek” and stop the moment p < 0.05 (peeking inflates false positives). Watch for novelty effects (temporary spikes from newness), seasonality, and running too many variants at once. Statistically significant is not necessarily business-meaningful — always look at the effect size.'}
  }
});

/* ---------- 7. sampling bias ---------- */
addConcept({
  id:'sampbias', icon:'🎯', color:'#EA580C',
  cat:{id:'Bias & ilusi', en:'Bias & illusion'},
  title:{id:'Bias pengambilan sampel', en:'Sampling bias'},
  tag:{id:'Kalau cara mengambil sampel pilih kasih, hasilnya salah — dan menambah data justru bikin makin yakin salah.', en:'If the way you sample is skewed, the result is wrong — and more data only makes you more confidently wrong.'},
  hook:{id:'Sebuah survei online bertanya “berapa jam kamu online per hari?” dan menemukan rata-rata 8 jam. Apakah ini mewakili masyarakat umum?', en:'An online survey asks “how many hours are you online per day?” and finds an average of 8 hours. Does this represent the general public?'},
  build:function(host,lang,reveal){

    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="sb-guess">'+
        '<button class="btn" data-v="yes">'+(lang==='id'?'Ya, sampelnya besar':'Yes, large sample')+'</button>'+
        '<button class="btn" data-v="no">'+(lang==='id'?'Tidak, caranya bias':'No, the method is biased')+'</button>'+
      '</div>'+
      '<div id="sb-after" style="display:none;margin-top:16px;">'+
        '<p class="readout" style="margin-bottom:6px;">'+(lang==='id'?'Tiap titik = satu orang (posisi = jam online). Pekat = makin besar peluangnya terpilih oleh survei online.':'Each dot = one person (position = hours online). Darker = more likely picked by an online survey.')+'</p>'+

        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;">'+
          '<div style="background:#ECFDF5;border-radius:10px;padding:11px;"><div class="readout" style="color:#16A34A;">▮ Rata-rata sejati</div><div class="big" id="sb-true" style="font-size:22px;color:#16A34A;"></div></div>'+
          '<div style="background:#EFF6FF;border-radius:10px;padding:11px;"><div class="readout" style="color:#2563EB;">▯ Rata-rata survei</div><div class="big" id="sb-samp" style="font-size:22px;color:#2563EB;"></div></div>'+

        :'Slide the bias strength right: the survey average (blue) drifts away from the true average (green), even though the number of people is the same. An online survey never reaches people who are rarely online, so its <b>sampling frame</b> is skewed from the start. Adding respondents does not cure it — bias error does not shrink like random error.');

  concept:{
    name:{id:'Bias pengambilan sampel', en:'Sampling bias'}, sub:{id:'“Dewey Defeats Truman”, 1948', en:'“Dewey Defeats Truman”, 1948'},
    def:{id:'Kesalahan sistematis yang terjadi ketika sampel dikumpulkan dengan cara yang membuat sebagian anggota populasi lebih mungkin terpilih daripada yang lain, sehingga sampel tidak mewakili populasi.', en:'A systematic error that occurs when a sample is collected in a way that makes some members of the population more likely to be selected than others, so the sample fails to represent the population.'},
    formula:'E[estimasi] − nilai sejati = <span class="v">bias</span> ≠ 0   ( tetap walau n → ∞ )',
    theory:{id:'Bedakan dua jenis error: error acak menyusut seperti 1/√n saat sampel diperbesar, tetapi error bias tidak — ia melekat pada cara pengambilan, bukan jumlahnya. Sampel besar yang bias hanya membuat estimasi yang salah terlihat lebih meyakinkan (selang kepercayaannya sempit tapi salah sasaran). Yang menentukan keterwakilan adalah kerangka sampel dan mekanisme seleksi, bukan ukuran.', en:'Distinguish two kinds of error: random error shrinks like 1/√n as the sample grows, but bias error does not — it is baked into how you sampled, not how much. A large biased sample just makes a wrong estimate look more convincing (its confidence interval is narrow but off-target). What determines representativeness is the sampling frame and selection mechanism, not the size.'},
    practice:{id:'Bentuk umumnya: bias seleksi mandiri (hanya yang peduli mengisi survei), bias non-respons, dan survivorship bias. Contoh historis: jajak pendapat 1936 dan 1948 yang meleset karena kerangka sampelnya condong ke kelompok tertentu. Pertahanan terbaik adalah pengambilan acak dari kerangka yang menjangkau seluruh populasi, plus melacak siapa yang tidak terjangkau atau tidak menjawab.', en:'Common forms: self-selection bias (only those who care fill out the survey), non-response bias, and survivorship bias. Historical examples: the 1936 and 1948 polls that missed badly because their sampling frame leaned toward certain groups. The best defense is random sampling from a frame that reaches the whole population, plus tracking who was unreachable or did not respond.'}
  }
});

/* ---------- 8. survivorship bias ---------- */
addConcept({

  cat:{id:'Bias & ilusi', en:'Bias & illusion'},
  title:{id:'Survivorship bias', en:'Survivorship bias'},

  hook:{id:'Pembom Perang Dunia II yang kembali penuh lubang peluru di sayap dan badan. Di bagian mana kamu memasang baja tambahan? (Klik area pesawat.)', en:'WWII bombers return riddled with bullet holes on the wings and fuselage. Where do you add extra armor? (Click a part of the plane.)'},

    var answered=false;
    var correct={cockpit:1,engine:1};
    var zoneLbl={cockpit:{id:'Kokpit',en:'Cockpit'},engine:{id:'Mesin',en:'Engines'},wing:{id:'Sayap',en:'Wings'},body:{id:'Badan',en:'Fuselage'},tail:{id:'Ekor',en:'Tail'}};
    function holes(){ var h='';var pts=[[55,108],[70,116],[40,100],[250,110],[235,118],[265,104],[150,70],[148,95],[152,120],[150,140],[150,160],[130,178],[170,182],[90,112],[210,108]];
      pts.forEach(function(p){h+='<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3.4" fill="#EF4444"/>';}); return h; }
    function planeSVG(){
      return '<svg viewBox="0 0 300 210" style="width:100%;max-width:430px;height:auto;">'+
        '<rect x="138" y="40" width="24" height="130" rx="11" fill="#CBD5E1"/>'+
        '<polygon points="150,18 162,46 138,46" fill="#CBD5E1"/>'+
        '<rect x="20" y="98" width="260" height="22" rx="9" fill="#CBD5E1"/>'+
        '<rect x="105" y="160" width="90" height="16" rx="7" fill="#CBD5E1"/>'+
        '<circle cx="92" cy="109" r="11" fill="#94A3B8"/><circle cx="208" cy="109" r="11" fill="#94A3B8"/>'+
        holes()+
        '<g id="zones" font-family="Plus Jakarta Sans">'+
        zone('cockpit',132,16,36,34)+
        zone('engine',78,92,30,34)+zone('engine',196,92,30,34)+
        zone('wing',22,98,56,22)+zone('wing',222,98,56,22)+
        zone('body',136,52,28,108)+
        zone('tail',108,160,84,18)+
        '</g></svg>';
    }
    function zone(name,x,y,w,h){ return '<rect class="pz" data-z="'+name+'" x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="4" fill="transparent" stroke="#64748B" stroke-width="1" stroke-dasharray="3,2" style="cursor:pointer;"/>'; }
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div id="sv-plot">'+planeSVG()+'</div>'+
      '<p class="readout" id="sv-leg" style="margin-top:4px;">'+(lang==='id'?'🔴 lubang peluru · klik salah satu area bergaris putus-putus':'🔴 bullet holes · click one of the dashed areas')+'</p>'+
      '<div class="feedback" id="sv-fb" style="display:block;"></div>';
    document.getElementById('sv-fb').style.display='none';
    var self=this;
    host.querySelectorAll('.pz').forEach(function(z){ z.addEventListener('click',function(){
      if(answered) return; answered=true;
      var pick=z.dataset.z, good=!!correct[pick];
      host.querySelectorAll('.pz').forEach(function(zz){ if(correct[zz.dataset.z]){zz.setAttribute('stroke','#16A34A');zz.setAttribute('stroke-width','2.5');zz.setAttribute('stroke-dasharray','');zz.setAttribute('fill','rgba(22,163,74,0.12)');} });
      var fb=document.getElementById('sv-fb'); fb.style.display='block';
      fb.innerHTML=(good
        ?(lang==='id'?'<b>Tepat — dan ini berlawanan dengan intuisi.</b> ':'<b>Correct — and it is counterintuitive.</b> ')
        :(lang==='id'?'<b>Pilihan paling umum, tapi keliru.</b> Kamu memilih '+L(zoneLbl[pick])+', area yang penuh lubang. ':'<b>The most common choice, but wrong.</b> You picked the '+L(zoneLbl[pick])+', the area full of holes. '))+
        (lang==='id'
        ?'Baja seharusnya dipasang di <b>mesin dan kokpit</b> (hijau) — justru area yang <i>tidak</i> ada lubangnya. Alasannya: kita hanya melihat pesawat yang <b>kembali</b>. Pesawat yang tertembak di mesin/kokpit jatuh dan tak pernah terdata. Lubang yang terlihat menandai tempat pesawat <i>bisa</i> bertahan, bukan tempat yang rawan.'
        :'Armor belongs on the <b>engines and cockpit</b> (green) — exactly the areas with <i>no</i> holes. The reason: we only see planes that <b>returned</b>. Planes hit in the engine/cockpit went down and were never recorded. The visible holes mark where a plane <i>can</i> survive being hit, not where it is vulnerable.');
      reveal();
    });});
  },
  concept:{
    name:{id:'Survivorship bias', en:'Survivorship bias'}, sub:{id:'Abraham Wald, 1943', en:'Abraham Wald, 1943'},
    def:{id:'Kekeliruan menarik kesimpulan hanya dari kasus yang “selamat” melewati suatu proses seleksi, sambil mengabaikan kasus yang gagal dan tidak lagi terlihat dalam data.', en:'The error of drawing conclusions only from cases that “survived” a selection process, while ignoring the cases that failed and are no longer visible in the data.'},
    formula:'kita mengamati P( X | selamat ),  bukan  P( X )',
    theory:{id:'Seleksi diam-diam menyaring data sebelum kita melihatnya, sehingga sampel yang tersisa terkondisikan pada “berhasil/selamat”. Statistik dari kelompok penyintas menjawab pertanyaan yang berbeda dari yang kita kira. Memperbaikinya menuntut kita memodelkan secara eksplisit data yang hilang — persis langkah jenius Wald: menyimpulkan letak titik fatal dari ketiadaan lubang pada pesawat yang kembali.', en:'Selection silently filters the data before we ever see it, so the remaining sample is conditioned on “success/survival”. Statistics from the survivor group answer a different question than the one we think we are asking. Fixing it requires explicitly modeling the missing data — exactly Wald’s insight: inferring the location of fatal hits from the absence of holes on returning planes.'},
    practice:{id:'Pola ini ada di mana-mana: “rahasia sukses” dari miliarder yang DO kuliah (yang gagal tidak diwawancarai), reksa dana berkinerja tinggi (yang bangkrut hilang dari daftar), atau bangunan tua yang “dibangun lebih kokoh” (yang rapuh sudah runtuh). Selalu tanyakan: “data siapa yang hilang dari sini, dan apakah kehilangannya tidak acak?”', en:'The pattern is everywhere: “secrets of success” from billionaire college dropouts (the failures are not interviewed), top-performing funds (the bankrupt ones drop off the list), or old buildings that were “built tougher” (the flimsy ones already collapsed). Always ask: “whose data is missing here, and is that absence non-random?”'}
  }
});

/* ---------- 9. regresi linier ---------- */
addConcept({
  id:'linreg', icon:'📈', color:'#2563EB',
  cat:{id:'Model & prediksi', en:'Models & prediction'},
  title:{id:'Regresi linier', en:'Linear regression'},
  tag:{id:'Menarik satu garis lurus “paling pas” menembus titik-titik data — tapi apa arti “paling pas”?', en:'Drawing the one “best-fit” straight line through the data points — but what does “best fit” mean?'},
  hook:{id:'Titik-titik = jam belajar vs nilai ujian. Geser kemiringan dan posisi garis sampai menurutmu paling pas, lalu bandingkan dengan garis terbaik matematis (OLS).', en:'The dots = hours studied vs exam score. Slide the slope and position until you think the line fits best, then compare with the mathematical best-fit line (OLS).'},
  build:function(host,lang,reveal){
    var pts=[[1,55],[2,61],[3,62],[4,70],[5,68],[6,78],[7,80],[8,85],[9,84],[10,93]];
    var n=pts.length, xb=0,yb=0; pts.forEach(function(p){xb+=p[0];yb+=p[1];}); xb/=n; yb/=n;
    var Sxy=0,Sxx=0,Syy=0; pts.forEach(function(p){Sxy+=(p[0]-xb)*(p[1]-yb);Sxx+=(p[0]-xb)*(p[0]-xb);Syy+=(p[1]-yb)*(p[1]-yb);});
    var mOLS=Sxy/Sxx, bOLS=yb-mOLS*xb;
    function sse(m,b){var s=0;pts.forEach(function(p){var e=p[1]-(m*p[0]+b);s+=e*e;});return s;}
    function draw(){
      var m=+document.getElementById('lr-m').value, b=+document.getElementById('lr-b').value;
      document.getElementById('lr-mv').textContent=m.toFixed(1); document.getElementById('lr-bv').textContent=b.toFixed(0);
      var W=460,H=240,pad=30,xlo=0,xhi=11,ylo=48,yhi=98;
      var X=function(x){return pad+(x-xlo)/(xhi-xlo)*(W-2*pad);}, Y=function(y){return H-pad-(y-ylo)/(yhi-ylo)*(H-2*pad);};
      var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:480px;height:auto;">';
      s+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#CBD5E1"/>';
      s+='<text x="'+(W-pad)+'" y="'+(H-10)+'" text-anchor="end" font-size="9" fill="#94A3B8">'+(lang==='id'?'jam belajar':'hours studied')+'</text>';
      pts.forEach(function(p){var yh=m*p[0]+b; s+='<line x1="'+X(p[0]).toFixed(1)+'" y1="'+Y(p[1]).toFixed(1)+'" x2="'+X(p[0]).toFixed(1)+'" y2="'+Y(yh).toFixed(1)+'" stroke="#F59E0B" stroke-width="1.2" opacity="0.65"/>';});
      var x1=xlo+0.3,x2=xhi-0.3;
      s+='<line x1="'+X(x1).toFixed(1)+'" y1="'+Y(m*x1+b).toFixed(1)+'" x2="'+X(x2).toFixed(1)+'" y2="'+Y(m*x2+b).toFixed(1)+'" stroke="#2563EB" stroke-width="2.4"/>';
      pts.forEach(function(p){s+='<circle cx="'+X(p[0]).toFixed(1)+'" cy="'+Y(p[1]).toFixed(1)+'" r="4.5" fill="#0F172A"/>';});
      s+='</svg>';
      document.getElementById('lr-plot').innerHTML=s;
      var S=sse(m,b), r2=1-S/Syy;
      document.getElementById('lr-sse').textContent=S.toFixed(0);
      document.getElementById('lr-r2').textContent=(r2>0?r2.toFixed(2):'0.00');
    }
    window.__lr_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div id="lr-plot"></div>'+
      '<p class="readout" style="margin:2px 0 8px;">'+(lang==='id'?'Garis kuning = selisih (error) tiap titik ke garis. Tujuan: perkecil jumlah error kuadrat.':'Yellow lines = each point’s error to the line. Goal: minimize the sum of squared errors.')+'</p>'+
      '<label class="fld">'+(lang==='id'?'Kemiringan: ':'Slope: ')+'<b id="lr-mv">1.0</b></label>'+
      '<input type="range" id="lr-m" min="0" max="6" value="1" step="0.1" oninput="(window.__lr_u&&window.__lr_u())"/>'+
      '<label class="fld" style="margin-top:6px;display:block;">'+(lang==='id'?'Titik potong: ':'Intercept: ')+'<b id="lr-bv">60</b></label>'+
      '<input type="range" id="lr-b" min="40" max="70" value="60" step="0.5" oninput="(window.__lr_u&&window.__lr_u())"/>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">'+
        '<div style="background:#FEF3C7;border-radius:10px;padding:11px;"><div class="readout">'+(lang==='id'?'Jumlah error kuadrat (SSE)':'Sum of squared errors (SSE)')+'</div><div class="big" id="lr-sse" style="font-size:22px;">—</div></div>'+
        '<div style="background:#EFF6FF;border-radius:10px;padding:11px;"><div class="readout">R² '+(lang==='id'?'(kecocokan)':'(fit)')+'</div><div class="big" id="lr-r2" style="font-size:22px;color:#2563EB;">—</div></div>'+
      '</div>'+
      '<div class="btn-row" style="margin-top:12px;"><button class="btn primary" id="lr-ols">'+(lang==='id'?'Bandingkan dengan garis terbaik (OLS)':'Compare with best-fit line (OLS)')+'</button></div>'+
      '<div class="feedback" id="lr-fb" style="display:block;"></div>';
    document.getElementById('lr-fb').style.display='none';
    draw();
    document.getElementById('lr-ols').onclick=function(){
      var userS=sse(+document.getElementById('lr-m').value,+document.getElementById('lr-b').value);
      document.getElementById('lr-m').value=mOLS.toFixed(2); document.getElementById('lr-b').value=bOLS.toFixed(2); draw();
      var fb=document.getElementById('lr-fb'); fb.style.display='block';
      fb.innerHTML=(lang==='id'
        ?'Garis terbaik OLS: kemiringan <b>'+mOLS.toFixed(1)+'</b>, titik potong <b>'+bOLS.toFixed(0)+'</b>. SSE tebakanmu <b>'+userS.toFixed(0)+'</b> → SSE terbaik <b>'+sse(mOLS,bOLS).toFixed(0)+'</b>. Tidak ada garis lurus lain yang bisa mengalahkan SSE ini — itulah arti “paling pas”. Kemiringan '+mOLS.toFixed(1)+' berarti tiap +1 jam belajar dikaitkan dengan +'+mOLS.toFixed(1)+' poin nilai.'
        :'OLS best-fit line: slope <b>'+mOLS.toFixed(1)+'</b>, intercept <b>'+bOLS.toFixed(0)+'</b>. Your SSE <b>'+userS.toFixed(0)+'</b> → best SSE <b>'+sse(mOLS,bOLS).toFixed(0)+'</b>. No other straight line can beat this SSE — that is what “best fit” means. A slope of '+mOLS.toFixed(1)+' means each +1 hour of study is associated with +'+mOLS.toFixed(1)+' score points.');
      reveal();
    };
  },
  concept:{
    name:{id:'Regresi linier (kuadrat terkecil)', en:'Linear regression (least squares)'}, sub:{id:'Legendre & Gauss, ~1805', en:'Legendre & Gauss, ~1805'},
    def:{id:'Metode untuk memodelkan hubungan antara sebuah variabel hasil dan satu/lebih prediktor sebagai garis lurus, dengan memilih garis yang meminimalkan jumlah kuadrat selisih vertikal (error) antara titik data dan garis.', en:'A method for modeling the relationship between an outcome and one or more predictors as a straight line, choosing the line that minimizes the sum of squared vertical differences (errors) between the data points and the line.'},
    formula:'ŷ = <span class="v">β₀</span> + <span class="v">β₁</span>x   ·   β₁ = Σ(xᵢ−x̄)(yᵢ−ȳ) / Σ(xᵢ−x̄)²',
    theory:{id:'Mengapa kuadrat, bukan nilai mutlak? Mengkuadratkan error menghukum simpangan besar lebih keras, menghasilkan solusi tunggal yang mulus dan bisa dihitung dengan rumus tertutup (tidak perlu coba-coba). Garis OLS selalu melewati titik rata-rata (x̄, ȳ), dan R² menyatakan proporsi keragaman y yang dijelaskan model. Asumsinya penting: hubungan kira-kira linier, error acak dan ragamnya seragam.', en:'Why squares, not absolute values? Squaring penalizes large deviations more harshly, yielding a single smooth solution computable with a closed-form formula (no trial and error). The OLS line always passes through the mean point (x̄, ȳ), and R² states the proportion of variation in y explained by the model. The assumptions matter: roughly linear relationship, random errors with constant variance.'},
    practice:{id:'Regresi linier adalah kuda beban analisis data: memperkirakan harga rumah, tren penjualan, dosis–respons. Tapi hati-hati: kemiringan menunjukkan asosiasi, bukan otomatis sebab-akibat; ekstrapolasi jauh di luar rentang data berbahaya; dan satu pencilan bisa menarik garis secara berlebihan. Selalu plot datanya dulu — angka R² tinggi pun bisa menyesatkan kalau polanya sebenarnya melengkung.', en:'Linear regression is the workhorse of data analysis: estimating house prices, sales trends, dose–response. But beware: the slope shows association, not automatically causation; extrapolating far beyond the data range is dangerous; and a single outlier can drag the line too much. Always plot the data first — even a high R² can mislead if the true pattern is curved.'}
  }
});

/* ============================ rendering ============================ */
var activeCat='__all', activeId=null;

function applyI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i]').forEach(function(el){ el.textContent=t(el.getAttribute('data-i')); });
  document.querySelectorAll('[data-iph]').forEach(function(el){ el.setAttribute('placeholder', t(el.getAttribute('data-iph'))); });
  document.getElementById('lang-id').className=(LANG==='id'?'on':'');
  document.getElementById('lang-en').className=(LANG==='en'?'on':'');
}
function cats(){ var set={}; CONCEPTS.forEach(function(c){ set[L(c.cat)]=1; }); return Object.keys(set); }
function renderChips(){
  var h='<button class="chip '+(activeCat==='__all'?'on':'')+'" onclick="setCat(\'__all\')">'+t('allcat')+'</button>';
  cats().forEach(function(c){ h+='<button class="chip '+(activeCat===c?'on':'')+'" onclick="setCat(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</button>'; });
  document.getElementById('chips').innerHTML=h;
}
function renderGrid(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var h='';
  CONCEPTS.forEach(function(c){
    if(activeCat!=='__all' && L(c.cat)!==activeCat) return;
    var hay=(L(c.title)+' '+L(c.tag)+' '+L(c.cat)).toLowerCase();
    if(q && hay.indexOf(q)<0) return;
    h+='<button class="tile" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="ico">'+c.icon+'</div>'+
      '<div class="cat">'+L(c.cat)+'</div>'+
      '<h3>'+L(c.title)+'</h3>'+
      '<p>'+L(c.tag)+'</p></button>';
  });
  if(!h) h='<p class="readout" style="grid-column:1/-1;">'+(LANG==='id'?'Tidak ada konsep yang cocok. Coba “Buat dengan AI”.':'No matching concept. Try “Generate with AI”.')+'</p>';
  document.getElementById('grid').innerHTML=h;
}
function setCat(c){ activeCat=c; renderChips(); renderGrid(); }
function onSearch(){ renderGrid(); }

function renderConceptCard(c){
  var box=document.getElementById('d-concept');
  var cc=c.concept;
  box.innerHTML='<span class="badge">'+t('named')+'</span>'+
    '<h3>'+L(cc.name)+'</h3>'+(cc.sub?'<div class="sub">'+L(cc.sub)+'</div>':'')+
    '<div class="sec"><div class="h">'+t('cDef')+'</div><p>'+L(cc.def)+'</p></div>'+
    '<div class="sec"><div class="h">'+t('cForm')+'</div><div class="formula">'+(cc.formula||'')+'</div></div>'+
    '<div class="sec"><div class="h">'+t('cTheory')+'</div><p>'+L(cc.theory)+'</p></div>'+
    '<div class="sec"><div class="h">'+t('cPractice')+'</div><p>'+L(cc.practice)+'</p></div>';
  box.style.display='block';
}
function openDetail(id){
  var c=CONCEPTS.find(function(x){return x.id===id;}); if(!c) return;
  activeId=id;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('d-cat').textContent=L(c.cat);
  document.getElementById('d-title').textContent=L(c.title);
  document.getElementById('d-tag').textContent=L(c.tag);
  document.getElementById('d-concept').style.display='none';
  document.getElementById('d-concept').innerHTML='';
  var host=document.getElementById('d-interactive'); host.innerHTML='';
  c.build(host, LANG, function(){ renderConceptCard(c); });
  window.scrollTo(0,0);
}
function goList(){ activeId=null; document.getElementById('view-detail').style.display='none'; document.getElementById('view-list').style.display='block'; }

function setLang(l){ LANG=l; localStorage.setItem('hs_lang',l); applyI18n(); renderChips(); renderGrid(); if(activeId) openDetail(activeId); }

/* ============================ settings + generate (Claude API) ============================ */
function openSettings(){ document.getElementById('apikey').value=localStorage.getItem('hs_key')||''; document.getElementById('model').value=localStorage.getItem('hs_model')||'claude-sonnet-4-6'; document.getElementById('settings').style.display='flex'; }
function closeSettings(){ document.getElementById('settings').style.display='none'; }
function saveSettings(){ localStorage.setItem('hs_key',document.getElementById('apikey').value.trim()); localStorage.setItem('hs_model',document.getElementById('model').value.trim()||'claude-sonnet-4-6'); closeSettings(); }

async function generate(){
  var q=(document.getElementById('q').value||'').trim();
  if(!q){ alert(LANG==='id'?'Ketik nama konsep dulu di kotak pencarian.':'Type a concept name in the search box first.'); return; }
  var key=localStorage.getItem('hs_key');
  if(!key){ openSettings(); return; }
  var model=localStorage.getItem('hs_model')||'claude-sonnet-4-6';
  // detail view as a loading card
  activeId=null;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('d-cat').textContent=LANG==='id'?'Dibuat dengan AI':'AI-generated';
  document.getElementById('d-title').textContent=q;
  document.getElementById('d-tag').textContent='';
  document.getElementById('d-concept').style.display='none';
  var host=document.getElementById('d-interactive');
  host.innerHTML='<p class="readout">⏳ '+(LANG==='id'?'Meminta Claude menyusun kartu konsep…':'Asking Claude to compose the concept card…')+'</p>';
  window.scrollTo(0,0);
  var langName=LANG==='id'?'Bahasa Indonesia':'English';
  var prompt='You are a statistics educator for the general public. For the concept "'+q+'", return ONLY valid minified JSON (no markdown) with keys: name, sub (a short attribution or origin, may be empty), def, formula, theory, practice. '+
    '"formula" may contain simple HTML like <br> and <span class=\\"v\\">…</span> to highlight key symbols. '+
    'Write def, theory, practice as plain prose in '+langName+'. def = 1-2 sentences. theory = ~3-4 sentences on the underlying reasoning. practice = ~3-4 sentences on real-world use and pitfalls. Keep it accurate and accessible.';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:model,max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){ var er=await res.text(); throw new Error('HTTP '+res.status+' — '+er.slice(0,200)); }
    var data=await res.json();
    var txt=(data.content&&data.content[0]&&data.content[0].text)||'';
    var m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error('No JSON in response');
    var obj=JSON.parse(m[0]);
    host.innerHTML='<p class="readout">'+(LANG==='id'?'Kartu konsep dibuat oleh Claude berdasarkan kata kunci kamu. (Interaktif “tebak/geser” belum tersedia untuk konsep hasil-generate.)':'Concept card generated by Claude from your query. (The interactive “guess/slide” is not available for generated concepts yet.)')+'</p>';
    var box=document.getElementById('d-concept');
    box.innerHTML='<span class="badge">✨ '+(LANG==='id'?'Dibuat dengan AI':'AI-generated')+'</span>'+
      '<h3>'+(obj.name||q)+'</h3>'+(obj.sub?'<div class="sub">'+obj.sub+'</div>':'')+
      '<div class="sec"><div class="h">'+t('cDef')+'</div><p>'+(obj.def||'')+'</p></div>'+
      (obj.formula?'<div class="sec"><div class="h">'+t('cForm')+'</div><div class="formula">'+obj.formula+'</div></div>':'')+
      '<div class="sec"><div class="h">'+t('cTheory')+'</div><p>'+(obj.theory||'')+'</p></div>'+
      '<div class="sec"><div class="h">'+t('cPractice')+'</div><p>'+(obj.practice||'')+'</p></div>';
    box.style.display='block';
  }catch(e){
    host.innerHTML='<div class="feedback" style="display:block;background:#FEF2F2;border-color:#FECACA;color:#991B1B;"><b>'+(LANG==='id'?'Gagal membuat konsep.':'Generation failed.')+'</b><br>'+String(e.message||e)+'<br><br>'+(LANG==='id'?'Periksa API key di ⚙️, atau model. Catatan: panggilan langsung dari browser butuh akun Anthropic yang mengizinkannya.':'Check your API key in ⚙️, or the model. Note: direct browser calls require an Anthropic account that permits it.')+'</div>';
  }
}

applyI18n(); renderChips(); renderGrid();
