      document.getElementById('mm-after').style.display='block';
      document.getElementById('mm-fb').innerHTML=(lang==='id'
        ?'Naikkan satu anggaran dari rendah ke tinggi: kontribusinya naik cepat lalu mendatar (jenuh). ROI marjinal — penjualan ekstra per rupiah berikutnya — terus mengecil. Jadi menggandakan TV tidak menggandakan penjualan TV. Tujuan MMM adalah menemukan campuran kanal yang menyeimbangkan ROI marjinal, bukan menuang semua dana ke satu kanal.'
        :'Raise one budget from low to high: its contribution rises fast then flattens (saturates). The marginal ROI — extra sales per next rupiah — keeps shrinking. So doubling TV does not double TV sales. The goal of MMM is to find the channel mix that balances marginal ROI, not pour all funds into one channel.');
      draw(); reveal();
    };});
  },
  concept:{
    name:{id:'Marketing Mix Model (MMM)', en:'Marketing Mix Model (MMM)'}, sub:{id:'ekonometrika pemasaran', en:'marketing econometrics'},
    def:{id:'Model statistik yang mengurai penjualan menjadi kontribusi dari berbagai kanal pemasaran dan faktor lain, untuk mengukur efektivitas tiap kanal dan memandu alokasi anggaran.', en:'A statistical model that decomposes sales into contributions from various marketing channels and other factors, to measure each channel’s effectiveness and guide budget allocation.'},
    formula:'Penjualan = dasar + Σ βᵢ · saturasi(belanjaᵢ) + musiman + …<br>saturasi: efek ↑ lalu mendatar (diminishing returns)',
    theory:{id:'Dua fenomena nyata membuat hubungan belanja–penjualan tidak linier: diminishing returns (tiap rupiah tambahan memberi efek lebih kecil saat kanal jenuh) dan adstock (efek iklan tertinggal beberapa periode, tidak langsung hilang). MMM memodelkan keduanya, lalu memperkirakan kontribusi tiap kanal dari data historis. Karena berbasis observasi (bukan eksperimen), hasilnya rentan terhadap perancu dan korelasi antar-belanja kanal.', en:'Two real phenomena make the spend–sales relationship nonlinear: diminishing returns (each extra rupiah has a smaller effect as a channel saturates) and adstock (ad effects carry over several periods, not vanishing instantly). MMM models both, then estimates each channel’s contribution from historical data. Because it is observational (not experimental), its results are vulnerable to confounding and correlation between channel spends.'},
    practice:{id:'MMM dipakai untuk merencanakan anggaran tingkat tinggi dan mengukur kanal yang sulit dilacak per individu (TV, billboard). Aturan emasnya: alokasikan agar ROI marjinal antar kanal seimbang, bukan mengejar kanal dengan ROI rata-rata tertinggi. Validasi dengan eksperimen (geo-test/lift test) bila memungkinkan, karena MMM sendiri tidak membuktikan sebab secara penuh.', en:'MMM is used for high-level budget planning and measuring channels hard to track per individual (TV, billboards). The golden rule: allocate so that marginal ROI is balanced across channels, not chase the channel with the highest average ROI. Validate with experiments (geo-tests/lift tests) where possible, since MMM alone does not fully prove causation.'}
  }
});

/* ---------- 25. central limit theorem ---------- */
addConcept({
  id:'clt', icon:'🔔', color:'#7C3AED',
  cat:{id:'Probabilitas', en:'Probability'},
  title:{id:'Teorema limit pusat', en:'Central limit theorem'},
  tag:{id:'Rata-rata dari apa pun — bahkan data paling berantakan — perlahan membentuk kurva lonceng yang sama.', en:'The average of anything — even the messiest data — slowly forms the same bell curve.'},
  hook:{id:'Populasi aslinya jauh dari lonceng (sangat miring atau dua puncak). Kalau kita ambil banyak sampel lalu menghitung rata-ratanya, bentuk sebaran rata-rata itu akan jadi seperti apa?', en:'The original population is far from a bell (very skewed or two-peaked). If we take many samples and compute their means, what shape will the distribution of those means take?'},
  build:function(host,lang,reveal){
    var shape='skew';
    function sampler(rng){ if(shape==='unif') return rng(); if(shape==='bimod') return rng()<0.5?rng()*0.26:0.74+rng()*0.26; return Math.min(0.999,(-Math.log(1-rng()))/6); }
    function hist(vals,K){ var b=new Array(K).fill(0); vals.forEach(function(v){var i=Math.min(K-1,Math.floor(v*K));b[i]++;}); var mx=Math.max.apply(null,b); return {b:b,mx:mx}; }
    function svgHist(h,col,K){ var W=220,H=120,pad=14,bw=(W-2*pad)/K; var s='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:240px;height:auto;">'; for(var i=0;i<K;i++){var hh=h.mx?h.b[i]/h.mx*(H-2*pad):0,x=pad+i*bw,y=H-pad-hh; s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw-0.6).toFixed(1)+'" height="'+Math.max(0.4,hh).toFixed(1)+'" fill="'+col+'"/>';} return s+'</svg>'; }
    function draw(){
      var n=Math.round(+document.getElementById('cl-r').value), K=30, M=2500;
      var rng=mulberry32(77);
      var pop=[]; for(var i=0;i<3000;i++) pop.push(sampler(rng));
      var means=[]; for(var j=0;j<M;j++){var s=0;for(var k=0;k<n;k++)s+=sampler(rng);means.push(s/n);}
      document.getElementById('cl-pop').innerHTML=svgHist(hist(pop,K),'#CBD5E1',K);
      document.getElementById('cl-mean').innerHTML=svgHist(hist(means,K),'#7C3AED',K);
      document.getElementById('cl-n').textContent=n;
      var mu=means.reduce(function(a,b){return a+b;},0)/M, sd=Math.sqrt(means.reduce(function(a,b){return a+(b-mu)*(b-mu);},0)/M);
      document.getElementById('cl-sd').textContent=sd.toFixed(3);
    }
    window.__cl_u=draw;
    host.innerHTML='<div class="scn"><div class="q">'+L(this.hook)+'</div></div>'+
      '<div class="btn-row" id="cl-guess">'+
        '<button class="btn" data-v="same">'+(lang==='id'?'Tetap miring seperti populasi':'Stays skewed like the population')+'</button>'+
        '<button class="btn" data-v="bell">'+(lang==='id'?'Menjadi lonceng (normal)':'Becomes a bell (normal)')+'</button>'+
      '</div>'+
      '<div id="cl-after" style="display:none;margin-top:16px;">'+
        '<div class="btn-row" style="margin-bottom:12px;">'+
          '<button class="btn primary" id="cl-skew">'+(lang==='id'?'Miring':'Skewed')+'</button>'+
          '<button class="btn" id="cl-unif">'+(lang==='id'?'Seragam':'Uniform')+'</button>'+
          '<button class="btn" id="cl-bimod">'+(lang==='id'?'Dua puncak':'Two peaks')+'</button>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
          '<div style="text-align:center;"><div class="readout" style="margin-bottom:4px;">'+(lang==='id'?'Populasi asli':'Original population')+'</div><div id="cl-pop"></div></div>'+
          '<div style="text-align:center;"><div class="readout" style="margin-bottom:4px;">'+(lang==='id'?'Sebaran rata-rata':'Distribution of means')+'</div><div id="cl-mean"></div></div>'+
        '</div>'+
        '<label class="fld" style="display:block;margin-top:10px;">'+(lang==='id'?'Ukuran tiap sampel n: ':'Each sample size n: ')+'<b id="cl-n">1</b> · '+(lang==='id'?'simpangan baku rata-rata: ':'std dev of means: ')+'<b id="cl-sd" style="color:#7C3AED;"></b></label>'+
        '<input type="range" id="cl-r" min="1" max="50" value="1" step="1" oninput="(window.__cl_u&&window.__cl_u())"/>'+
        '<div class="feedback" id="cl-fb" style="display:block;"></div>'+
      '</div>';
    host.querySelectorAll('#cl-guess button').forEach(function(b){ b.onclick=function(){
      document.getElementById('cl-after').style.display='block';
      document.getElementById('cl-fb').innerHTML=(lang==='id'
        ?'Geser n dari 1 ke atas: di n=1 sebaran rata-rata sama persis dengan populasi (miring/dua puncak), tapi mulai n≈10–30 ia berubah jadi <b>lonceng</b> yang mulus — apa pun bentuk aslinya. Coba ketiga bentuk populasi, hasilnya sama. Selain itu lonceng makin sempit (simpangan baku turun seperti σ/√n). Inilah alasan distribusi normal muncul di mana-mana.'
        :'Slide n upward: at n=1 the distribution of means is identical to the population (skewed/two-peaked), but from n≈10–30 it turns into a smooth <b>bell</b> — whatever the original shape. Try all three population shapes; the result is the same. The bell also narrows (its std dev falls like σ/√n). This is why the normal distribution shows up everywhere.');
      draw(); reveal();
    };});
    setTimeout(function(){
      var sk=document.getElementById('cl-skew'),un=document.getElementById('cl-unif'),bi=document.getElementById('cl-bimod');
      function set(sh,a){shape=sh;[sk,un,bi].forEach(function(x){x.className='btn';});a.className='btn primary';draw();}
      if(sk){sk.onclick=function(){set('skew',sk);};un.onclick=function(){set('unif',un);};bi.onclick=function(){set('bimod',bi);};}
    },0);
  },
  concept:{
    name:{id:'Teorema limit pusat', en:'Central limit theorem'}, sub:{id:'de Moivre–Laplace; Lyapunov', en:'de Moivre–Laplace; Lyapunov'},
    def:{id:'Jika kita menjumlahkan atau merata-ratakan banyak variabel acak yang independen dengan ragam terbatas, distribusi dari jumlah/rata-rata itu akan mendekati distribusi normal, berapa pun bentuk distribusi asalnya.', en:'If we sum or average many independent random variables with finite variance, the distribution of that sum/mean approaches a normal distribution, regardless of the original distribution’s shape.'},
    formula:'X̄ₙ → Normal( μ, σ²/n )   saat n → ∞',
    theory:{id:'Inilah “mengapa” di balik kurva lonceng yang ada di mana-mana: banyak besaran nyata adalah hasil penjumlahan dari banyak pengaruh acak kecil, sehingga otomatis menjadi normal. Penjumlahan meredam keanehan bentuk asal — kemiringan dan puncak ganda saling rata. Yang dibutuhkan hanyalah variabel independen dengan ragam terbatas; kecepatan konvergensinya bergantung pada seberapa “liar” distribusi awalnya (yang miring butuh n lebih besar).', en:'This is the “why” behind the ubiquitous bell curve: many real quantities are sums of many small random influences, so they automatically become normal. Summation washes out the quirks of the original shape — skew and double peaks average out. All that is needed is independent variables with finite variance; the speed of convergence depends on how “wild” the starting distribution is (skewed ones need larger n).'},
    practice:{id:'Teorema ini adalah izin teoretis di balik banyak alat statistik: selang kepercayaan, uji-t, dan uji-z bekerja karena rata-rata sampel menjadi normal. Itu sebabnya “n ≥ 30” sering dipakai sebagai aturan praktis. Hati-hati pada pengecualian: data berekor sangat berat (ragam tak terbatas) atau data yang tidak independen bisa gagal menyatu, sehingga asumsi normal menjadi keliru.', en:'This theorem is the theoretical license behind many statistical tools: confidence intervals, t-tests, and z-tests work because sample means become normal. That is why “n ≥ 30” is often used as a rule of thumb. Beware the exceptions: very heavy-tailed data (infinite variance) or non-independent data may fail to converge, making the normality assumption wrong.'}
  }
});

/* ============================ rendering ============================ */
var activeCat='__all', activeId=null;

function applyI18n(){
  document.documentElement.lang=LANG;
  document.querySelectorAll('[data-i]').forEach(function(el){ el.textContent=t(el.getAttribute('data-i')); });
  document.querySelectorAll('[data-iph]').forEach(function(el){ el.setAttribute('placeholder', t(el.getAttribute('data-iph'))); });
  document.getElementById('lang-id').className=(LANG==='id'?'on':'');
  document.getElementById('lang-en').className=(LANG==='en'?'on':'');
}
function cats(){ var set={}; CONCEPTS.forEach(function(c){ set[L(c.cat)]=1; }); return Object.keys(set); }
function renderChips(){
  var h='<button class="chip '+(activeCat==='__all'?'on':'')+'" onclick="setCat(\'__all\')">'+t('allcat')+'</button>';
  cats().forEach(function(c){ h+='<button class="chip '+(activeCat===c?'on':'')+'" onclick="setCat(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</button>'; });
  document.getElementById('chips').innerHTML=h;
}
function renderGrid(){
  var q=(document.getElementById('q').value||'').toLowerCase();
  var h='';
  CONCEPTS.forEach(function(c){
    if(activeCat!=='__all' && L(c.cat)!==activeCat) return;
    var hay=(L(c.title)+' '+L(c.tag)+' '+L(c.cat)).toLowerCase();
    if(q && hay.indexOf(q)<0) return;
    h+='<button class="tile" onclick="openDetail(\''+c.id+'\')">'+
      '<div class="ico">'+c.icon+'</div>'+
      '<div class="cat">'+L(c.cat)+'</div>'+
      '<h3>'+L(c.title)+'</h3>'+
      '<p>'+L(c.tag)+'</p></button>';
  });
  if(!h) h='<p class="readout" style="grid-column:1/-1;">'+(LANG==='id'?'Tidak ada konsep yang cocok. Coba “Buat dengan AI”.':'No matching concept. Try “Generate with AI”.')+'</p>';
  document.getElementById('grid').innerHTML=h;
}
function setCat(c){ activeCat=c; renderChips(); renderGrid(); }
function onSearch(){ renderGrid(); }

function renderConceptCard(c){
  var box=document.getElementById('d-concept');
  var cc=c.concept;
  box.innerHTML='<span class="badge">'+t('named')+'</span>'+
    '<h3>'+L(cc.name)+'</h3>'+(cc.sub?'<div class="sub">'+L(cc.sub)+'</div>':'')+
    '<div class="sec"><div class="h">'+t('cDef')+'</div><p>'+L(cc.def)+'</p></div>'+
    '<div class="sec"><div class="h">'+t('cForm')+'</div><div class="formula">'+(cc.formula||'')+'</div></div>'+
    '<div class="sec"><div class="h">'+t('cTheory')+'</div><p>'+L(cc.theory)+'</p></div>'+
    '<div class="sec"><div class="h">'+t('cPractice')+'</div><p>'+L(cc.practice)+'</p></div>';
  box.style.display='block';
}
function openDetail(id){
  var c=CONCEPTS.find(function(x){return x.id===id;}); if(!c) return;
  activeId=id;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('d-cat').textContent=L(c.cat);
  document.getElementById('d-title').textContent=L(c.title);
  document.getElementById('d-tag').textContent=L(c.tag);
  document.getElementById('d-concept').style.display='none';
  document.getElementById('d-concept').innerHTML='';
  var host=document.getElementById('d-interactive'); host.innerHTML='';
  c.build(host, LANG, function(){ renderConceptCard(c); });
  window.scrollTo(0,0);
}
function goList(){ activeId=null; document.getElementById('view-detail').style.display='none'; document.getElementById('view-list').style.display='block'; }

function setLang(l){ LANG=l; localStorage.setItem('hs_lang',l); applyI18n(); renderChips(); renderGrid(); if(activeId) openDetail(activeId); }

/* ============================ settings + generate (Claude API) ============================ */
function openSettings(){ document.getElementById('apikey').value=localStorage.getItem('hs_key')||''; document.getElementById('model').value=localStorage.getItem('hs_model')||'claude-sonnet-4-6'; document.getElementById('settings').style.display='flex'; }
function closeSettings(){ document.getElementById('settings').style.display='none'; }
function saveSettings(){ localStorage.setItem('hs_key',document.getElementById('apikey').value.trim()); localStorage.setItem('hs_model',document.getElementById('model').value.trim()||'claude-sonnet-4-6'); closeSettings(); }

async function generate(){
  var q=(document.getElementById('q').value||'').trim();
  if(!q){ alert(LANG==='id'?'Ketik nama konsep dulu di kotak pencarian.':'Type a concept name in the search box first.'); return; }
  var key=localStorage.getItem('hs_key');
  if(!key){ openSettings(); return; }
  var model=localStorage.getItem('hs_model')||'claude-sonnet-4-6';
  // detail view as a loading card
  activeId=null;
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-detail').style.display='block';
  document.getElementById('d-cat').textContent=LANG==='id'?'Dibuat dengan AI':'AI-generated';
  document.getElementById('d-title').textContent=q;
  document.getElementById('d-tag').textContent='';
  document.getElementById('d-concept').style.display='none';
  var host=document.getElementById('d-interactive');
  host.innerHTML='<p class="readout">⏳ '+(LANG==='id'?'Meminta Claude menyusun kartu konsep…':'Asking Claude to compose the concept card…')+'</p>';
  window.scrollTo(0,0);
  var langName=LANG==='id'?'Bahasa Indonesia':'English';
  var prompt='You are a statistics educator for the general public. For the concept "'+q+'", return ONLY valid minified JSON (no markdown) with keys: name, sub (a short attribution or origin, may be empty), def, formula, theory, practice. '+
    '"formula" may contain simple HTML like <br> and <span class=\\"v\\">…</span> to highlight key symbols. '+
    'Write def, theory, practice as plain prose in '+langName+'. def = 1-2 sentences. theory = ~3-4 sentences on the underlying reasoning. practice = ~3-4 sentences on real-world use and pitfalls. Keep it accurate and accessible.';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:model,max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){ var er=await res.text(); throw new Error('HTTP '+res.status+' — '+er.slice(0,200)); }
    var data=await res.json();
    var txt=(data.content&&data.content[0]&&data.content[0].text)||'';
    var m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error('No JSON in response');
    var obj=JSON.parse(m[0]);
    host.innerHTML='<p class="readout">'+(LANG==='id'?'Kartu konsep dibuat oleh Claude berdasarkan kata kunci kamu. (Interaktif “tebak/geser” belum tersedia untuk konsep hasil-generate.)':'Concept card generated by Claude from your query. (The interactive “guess/slide” is not available for generated concepts yet.)')+'</p>';
    var box=document.getElementById('d-concept');
    box.innerHTML='<span class="badge">✨ '+(LANG==='id'?'Dibuat dengan AI':'AI-generated')+'</span>'+
      '<h3>'+(obj.name||q)+'</h3>'+(obj.sub?'<div class="sub">'+obj.sub+'</div>':'')+
      '<div class="sec"><div class="h">'+t('cDef')+'</div><p>'+(obj.def||'')+'</p></div>'+
      (obj.formula?'<div class="sec"><div class="h">'+t('cForm')+'</div><div class="formula">'+obj.formula+'</div></div>':'')+
      '<div class="sec"><div class="h">'+t('cTheory')+'</div><p>'+(obj.theory||'')+'</p></div>'+
      '<div class="sec"><div class="h">'+t('cPractice')+'</div><p>'+(obj.practice||'')+'</p></div>';
    box.style.display='block';
  }catch(e){
    host.innerHTML='<div class="feedback" style="display:block;background:#FEF2F2;border-color:#FECACA;color:#991B1B;"><b>'+(LANG==='id'?'Gagal membuat konsep.':'Generation failed.')+'</b><br>'+String(e.message||e)+'<br><br>'+(LANG==='id'?'Periksa API key di ⚙️, atau model. Catatan: panggilan langsung dari browser butuh akun Anthropic yang mengizinkannya.':'Check your API key in ⚙️, or the model. Note: direct browser calls require an Anthropic account that permits it.')+'</div>';
  }
}

/* ============================ init ============================ */
applyI18n(); renderChips(); renderGrid();
</script>
